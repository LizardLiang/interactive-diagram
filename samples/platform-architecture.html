<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Platform Architecture Poster</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "PingFang TC",
          "Microsoft JhengHei", "Noto Sans TC", sans-serif;
        background: #eef2f7;
        color: #16233f;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 16px 40px;
      }
      #bar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        background: #fff;
        border: 1px solid #dbe2ec;
        border-radius: 11px;
        padding: 7px 11px;
        box-shadow: 0 5px 16px rgba(15, 39, 64, 0.12);
      }
      .btn {
        border: 1px solid #dbe2ec;
        background: #fff;
        color: #16233f;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12.5px;
        cursor: pointer;
        transition: 0.15s;
      }
      .btn:hover {
        background: #eef2f7;
        transform: translateY(-1px);
      }
      .btn.primary {
        background: linear-gradient(135deg, #5b8def, #3b6fe0);
        color: #fff;
        border: none;
        font-weight: 700;
      }
      .hint {
        font-size: 11.5px;
        color: #5b6b80;
      }
      #stage {
        width: 100%;
        max-width: 1080px;
      }
      #stage svg {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 16px;
        box-shadow: 0 18px 50px rgba(15, 39, 64, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <button class="btn primary" id="png">↓ PNG（貼到 PPT）</button>
      <button class="btn" id="svg">↓ SVG</button>
      <button class="btn" id="audit">⚑ 檢查溢出／重疊</button>
      <span class="hint" id="hint"></span>
    </div>
    <div id="stage"></div>

    <script>
      // ====================================================================
      // PLATFORM ARCHITECTURE POSTER — composable, static, slide-ready.
      //
      // This is a STATIC infographic generator (no pan/zoom/dark mode). It
      // renders one horizontal "platform architecture" poster on a white
      // background and exports it as PNG (for pasting into slides) or SVG.
      //
      // You edit ONLY the `config` object below. Everything stacks top-down:
      // each entry in `config.sections` is rendered in order and joined to the
      // next by a connector. To change the picture, add / remove / reorder
      // sections, or edit their data — the layout restacks automatically.
      //
      // Section types (see SECTIONS registry): "workflow-row",
      // "platform-panel", "api-node", "provider-bar".
      // Connector types (see CONNECTORS registry, set via a section's
      // `connect` field — applied to the gap BELOW that section):
      // "arrows-down", "dashed-converge", "dashed-line", "none".
      //
      // To add a NEW section type: add a renderer to SECTIONS keyed by its
      // type name; it receives (sec, ctx) and returns
      // { height, svg, topPort:{x,y}, bottomPorts:[{x,y}...] }.
      // To add a NEW connector: add a function to CONNECTORS keyed by name;
      // it receives (fromPorts, toPort, cctx) and returns an SVG string.

      // ============================ CONFIG ============================
      // Worked example — a fictional "Helio" customer-support AI platform.
      // All names, vendors, and copy here are made up for illustration.
      const config = {
        meta: {
          title: "Helio — Support Automation Platform",
          hint: "Platform architecture · white background, slide-ready",
          width: 1440, // artwork content width
          pad: 30, // white export padding around the artwork
          margin: 40, // left/right inner margin for sections
          gap: 28, // vertical gap between stacked sections
          accent: "#3b6fe0", // default accent color
          fileName: "helio-platform-architecture", // export filename (no extension)
        },
        sections: [
          {
            type: "workflow-row",
            connect: "arrows-down",
            items: [
              { ic: "upload", t: "Receive ticket" },
              { ic: "scan", t: "Classify intent" },
              { ic: "edit", t: "Draft reply" },
              { ic: "check", t: "Resolve & route" },
            ],
          },
          {
            type: "platform-panel",
            connect: "dashed-converge",
            brand: {
              name: "Helio",
              sub: "SUPPORT AI",
              grad: ["#16c0d8", "#5b6ef5"],
            },
            capabilities: [
              {
                ic: "plug",
                tint: "#e9edff",
                col: "#4f6ef7",
                h: "Tools & Integration",
                en: "Connectors",
                d: ["Read and write across your stack", "so the agent can actually act"],
                paren: "(CRM / KB / Order system)",
              },
              {
                ic: "flow",
                tint: "#efe9ff",
                col: "#8a5cf6",
                h: "Orchestration",
                en: "Workflows",
                d: ["Chain multi-step pipelines that", "drive each ticket to resolution"],
                paren: "(triage → draft → review → send)",
              },
              {
                ic: "agent",
                tint: "#e7f1ff",
                col: "#2f8fe0",
                h: "Expert Agents",
                en: "Specialists",
                d: ["A dedicated agent per channel", "and topic, working in concert"],
                paren: "(billing / technical / escalation)",
              },
            ],
            memory: {
              ic: "db",
              tint: "#e3f6f1",
              col: "#0fb39a",
              h: "Context & Memory",
              en: "Shared State",
              d: "Remembers the conversation and the customer's history across turns so every reply stays consistent",
              pills: ["Conversation history", "Customer profile & past tickets"],
            },
          },
          {
            type: "api-node",
            connect: "dashed-line",
            label: ["API", "Gateway"],
            r: 40,
            color: "#f5901f",
          },
          {
            type: "provider-bar",
            brand: {
              ic: "sparkles",
              h: "Model Providers",
              sub: "Swap or mix providers per task",
              col: "#f5811f",
            },
            items: [
              { name: "Anthropic", logo: "A", g: "#d97757" },
              { name: "OpenAI", logo: "O", g: "#10a37f" },
              { name: "Google", logo: "G", g: "#4285f4" },
              { name: "Extensible", more: true },
            ],
          },
        ],
      };
      // ============================ HELPERS ============================
      const NS = "http://www.w3.org/2000/svg";
      const MONO =
        "ui-monospace, 'Cascadia Code', 'SF Mono', Consolas, monospace";
      const SANS =
        "'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, 'PingFang TC', 'Microsoft JhengHei', 'Noto Sans TC', sans-serif";

      // Lucide icons (MIT) — clean, consistent 24×24 stroke set.
      // Add new icons here: name → the inner <path>/<circle>… markup (24×24).
      const LUCIDE = {
        upload: `<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/>`,
        scan: `<path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 8h10"/><path d="M7 12h10"/><path d="M7 16h6"/>`,
        edit: `<path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/>`,
        check: `<path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/>`,
        report: `<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M8 18v-2"/><path d="M12 18v-5"/><path d="M16 18v-3"/>`,
        plug: `<path d="M12 22v-5"/><path d="M9 8V2"/><path d="M15 8V2"/><path d="M18 8v5a4 4 0 0 1-4 4h-4a4 4 0 0 1-4-4V8Z"/>`,
        flow: `<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.7 10.7 6.6-3.4"/><path d="m8.7 13.3 6.6 3.4"/>`,
        agent: `<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>`,
        db: `<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/>`,
        sparkles: `<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>`,
      };
      function icon(name, cx, cy, r, color, swBase) {
        const body = LUCIDE[name] || "";
        if (!LUCIDE[name]) console.warn(`[platform] unknown icon: ${name}`);
        const f = (r * 1.5) / 24,
          sw = ((swBase || 2.1) / f).toFixed(2);
        return `<g transform="translate(${cx} ${cy}) scale(${f}) translate(-12 -12)"
          fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${body}</g>`;
      }
      const esc = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      function tx(x, y, s, o = {}) {
        const ls = o.ls ? `letter-spacing="${o.ls}"` : "";
        const ff = o.mono ? `font-family="${MONO}"` : "";
        return `<text x="${x}" y="${y}" font-size="${o.size}" font-weight="${o.weight || 400}" fill="${o.fill}" text-anchor="${o.anchor || "middle"}" ${ls} ${ff}>${esc(s)}</text>`;
      }
      const gloss = (x, y, w, h, rx) =>
        `<rect x="${x}" y="${y}" width="${w}" height="${(h * 0.5).toFixed(1)}" rx="${rx}" fill="url(#tileGloss)" opacity="0.7"/>`;
      function glassTile(x, y, sz, rx, accent) {
        return `<rect x="${x}" y="${y}" width="${sz}" height="${sz}" rx="${rx}" fill="${accent}" fill-opacity="0.06" stroke="${accent}" stroke-opacity="0.45" stroke-width="1.2"/>`;
      }
      function iconBox(x, y, sz, name, tint, color) {
        return (
          glassTile(x, y, sz, 12, color) +
          icon(name, x + sz / 2, y + sz / 2, sz * 0.42, color, 2.4)
        );
      }
      function pill(x, y, label, fill, color, size) {
        const sz = size || 13,
          w = Math.round(label.length * sz * 0.98 + 26);
        return {
          w,
          svg:
            `<rect x="${x}" y="${y}" width="${w}" height="28" rx="14" fill="${fill}"/>` +
            tx(x + w / 2, y + 19, label, { size: sz, weight: 600, fill: color }),
        };
      }

      // ============================ LAYOUT AUDIT ============================
      // Overflow + overlap detection for the static poster — the analogue of the
      // interactive skeleton's layout guard. The layout is deterministic (sections
      // stack top-down), so the failure modes are (1) text wider than the box it
      // sits in — a capability line, card label, chip name, brand caption, pills row
      // — and (2) sibling boxes packed so tight they overlap (too many chips/cards).
      //
      // Renderers record what they draw via `ctx.audit` (a collector built per
      // build): `audit.box(id, group, x,y,w,h)` registers a rectangle for
      // sibling-overlap checks; `fitText(audit, …)` records that a string must stay
      // inside an owner box (horizontal containment). `evalAudit()` walks the records
      // and returns { ok, count, conflicts[] }. The ⚑ button re-runs it, logs a
      // console.table, and paints red highlight overlays on every offender.
      const _measureCtx = document.createElement("canvas").getContext("2d");
      function measureText(s, size, weight, mono) {
        _measureCtx.font = `${weight || 400} ${size}px ${mono ? MONO : SANS}`;
        return _measureCtx.measureText(String(s)).width;
      }
      function overlaps(a, b, gap = 0) {
        // gap < 0 requires a real (non-touching) overlap of at least |gap|px
        return (
          a.x < b.x + b.w + gap &&
          b.x < a.x + a.w + gap &&
          a.y < b.y + b.h + gap &&
          b.y < a.y + a.h + gap
        );
      }
      function newAudit() {
        const A = { groups: {}, fits: [] };
        // register a rectangle that must not overlap its group siblings
        A.box = (id, group, x, y, w, h) =>
          (A.groups[group] || (A.groups[group] = [])).push({ id, x, y, w, h });
        // register a text box (with .label) that must stay inside owner = { x, w, name }
        A.fit = (owner, box) => A.fits.push({ owner, box });
        return A;
      }
      // Record that `label`, drawn at (drawX, drawY baseline) with the given
      // anchor/size/weight, must fit horizontally within [ownerX, ownerX+ownerW]
      // (named ownerName).
      function fitText(A, label, drawX, drawY, anchor, size, weight, mono, ownerX, ownerW, ownerName) {
        if (!A || label == null || label === "") return;
        const w = measureText(label, size, weight, mono);
        const bx = anchor === "start" ? drawX : anchor === "end" ? drawX - w : drawX - w / 2;
        A.fit(
          { x: ownerX, w: ownerW, name: ownerName },
          { x: bx, y: drawY - size, w, h: size * 1.2, label },
        );
      }
      function evalAudit(A) {
        const C = [];
        const tol = 1.5;
        // (1) horizontal overflow: each text box must sit inside its owner
        A.fits.forEach((f) => {
          const o = f.owner,
            b = f.box;
          if (b.x < o.x - tol || b.x + b.w > o.x + o.w + tol) {
            const over = Math.round(
              Math.max(o.x - b.x, b.x + b.w - (o.x + o.w)),
            );
            C.push({
              kind: "overflow",
              msg: `「${b.label}」超出${o.name} ${over}px`,
              rect: { x: b.x, y: b.y, w: b.w, h: b.h },
            });
          }
        });
        // (2) overlap: sibling boxes within a group must not intersect
        Object.entries(A.groups).forEach(([g, arr]) => {
          for (let i = 0; i < arr.length; i++)
            for (let j = i + 1; j < arr.length; j++) {
              if (overlaps(arr[i], arr[j], -0.5)) {
                const ix = Math.max(arr[i].x, arr[j].x),
                  iy = Math.max(arr[i].y, arr[j].y),
                  ax = Math.min(arr[i].x + arr[i].w, arr[j].x + arr[j].w),
                  ay = Math.min(arr[i].y + arr[i].h, arr[j].y + arr[j].h);
                C.push({
                  kind: "overlap",
                  msg: `${g}：「${arr[i].id}」與「${arr[j].id}」重疊`,
                  rect: { x: ix, y: iy, w: ax - ix, h: ay - iy },
                });
              }
            }
        });
        return { ok: C.length === 0, count: C.length, conflicts: C };
      }

      const DEFS = `<defs>
        <linearGradient id="plat" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef3ff"/><stop offset="1" stop-color="#ede9ff"/></linearGradient>
        <linearGradient id="tileGloss" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
        <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff3e8"/><stop offset="1" stop-color="#ffe9d8"/></linearGradient>
        <filter id="sh" x="-20%" y="-30%" width="140%" height="170%"><feDropShadow dx="0" dy="6" stdDeviation="11" flood-color="#1b3a6b" flood-opacity="0.10"/></filter>
        <filter id="shc" x="-30%" y="-40%" width="160%" height="190%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1b3a6b" flood-opacity="0.09"/></filter>
      </defs>`;

      // ============================ SECTIONS ============================
      // Each renderer: (sec, ctx) => { height, svg, topPort, bottomPorts }.
      // ctx = { x, y, w, cx, W, M, accent } — x/w is the content box, y is the
      // section's top, cx is the artwork horizontal center.
      const SECTIONS = {
        "workflow-row"(sec, ctx) {
          const items = sec.items || [];
          const n = items.length || 1;
          const wH = sec.cardH || 80;
          const wGap = sec.gap || 28;
          const cw = (ctx.w - wGap * (n - 1)) / n;
          const accent = sec.accent || ctx.accent;
          const A = ctx.audit;
          const ports = [];
          let svg = "";
          items.forEach((it, i) => {
            const x = ctx.x + i * (cw + wGap),
              cx = x + cw / 2,
              y = ctx.y;
            svg += `<rect x="${x}" y="${y}" width="${cw}" height="${wH}" rx="14" fill="#ffffff" stroke="#e6ecf7" stroke-width="1.4" filter="url(#sh)"/>`;
            svg += glassTile(x + 16, y + (wH - 44) / 2, 44, 13, accent);
            svg += icon(it.ic, x + 38, y + wH / 2, 16, accent, 2.4);
            const ty = y + wH / 2 + 6;
            svg += tx(x + 74, ty, it.t, {
              size: 20,
              weight: 800,
              fill: "#1b2c48",
              anchor: "start",
            });
            if (i < n - 1) {
              const gx = x + cw + wGap / 2,
                gy = y + wH / 2;
              svg += `<path d="M${gx - 5} ${gy - 7} L${gx + 5} ${gy} L${gx - 5} ${gy + 7}" fill="none" stroke="#b9c8e6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
            }
            ports.push({ x: cx, y: y + wH });
            // audit: card label must fit between the icon and the card's right edge
            if (A) {
              A.box(`卡片 ${i + 1}`, "workflow-row 卡片", x, y, cw, wH);
              fitText(A, it.t, x + 74, ty, "start", 20, 800, false,
                x + 74, cw - 74 - 14, `卡片 ${i + 1}`);
            }
          });
          return {
            height: wH,
            svg,
            topPort: { x: ctx.cx, y: ctx.y },
            bottomPorts: ports,
          };
        },

        "platform-panel"(sec, ctx) {
          const caps = sec.capabilities || [];
          const mem = sec.memory;
          const maxD = caps.reduce((m, c) => Math.max(m, (c.d || []).length), 0) || 2;
          const capBottom = 53 + maxD * 23; // relative to inner-card top
          const dvOffset = Math.max(148, capBottom + 30);
          const iH = mem ? dvOffset + 112 : capBottom + 24;
          const pH = iH + 36;
          const pX = ctx.x,
            pY = ctx.y,
            pW = ctx.w;
          const A = ctx.audit;
          let svg = "";
          svg += `<rect x="${pX}" y="${pY}" width="${pW}" height="${pH}" rx="24" fill="url(#plat)" stroke="#dde6f7" stroke-width="1.4"/>`;
          // configurable brand gradient
          const g = (sec.brand && sec.brand.grad) || ["#16c0d8", "#5b6ef5"];
          svg += `<defs><linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${g[0]}"/><stop offset="1" stop-color="${g[1]}"/></linearGradient></defs>`;
          const hx = pX + 84,
            hy = pY + pH / 2 - 12,
            sq = 96,
            sx = hx - sq / 2,
            sy = hy - sq / 2,
            sr = 30;
          svg += `<rect x="${sx}" y="${sy}" width="${sq}" height="${sq}" rx="${sr}" fill="url(#brandGrad)" fill-opacity="0.1" stroke="url(#brandGrad)" stroke-width="1.8"/>`;
          svg +=
            `<g transform="translate(${hx} ${hy})">` +
            `<ellipse cx="0" cy="0" rx="33" ry="14" transform="rotate(-22)" fill="none" stroke="url(#brandGrad)" stroke-opacity="0.95" stroke-width="2.4"/>` +
            `<circle cx="30.6" cy="-12.4" r="3.6" fill="url(#brandGrad)"/>` +
            `<path d="M0 -12 C 1.2 -3.3 3.3 -1.2 12 0 C 3.3 1.2 1.2 3.3 0 12 C -1.2 3.3 -3.3 1.2 -12 0 C -3.3 -1.2 -1.2 -3.3 0 -12 Z" fill="url(#brandGrad)"/>` +
            `</g>`;
          const brand = sec.brand || {};
          if (brand.name)
            svg += tx(hx, hy + 74, brand.name, {
              size: 28,
              weight: 800,
              fill: "#2a2f6b",
            });
          if (brand.sub)
            svg += tx(hx, hy + 98, brand.sub, {
              size: 18,
              fill: "#525796",
              ls: 1.5,
              mono: true,
            });
          // inner white card
          const iX = pX + 188,
            iY = pY + 18,
            iW = pX + pW - iX - 20;
          // audit: brand caption must stay within the brand column (left of the card)
          if (A) {
            fitText(A, brand.name, hx, hy + 74, "middle", 28, 800, false,
              pX + 8, iX - 16 - (pX + 8), "品牌欄");
            fitText(A, brand.sub, hx, hy + 98, "middle", 18, 400, true,
              pX + 8, iX - 16 - (pX + 8), "品牌欄");
          }
          svg += `<rect x="${iX}" y="${iY}" width="${iW}" height="${iH}" rx="18" fill="#ffffff" stroke="#eef1f9" stroke-width="1.2" filter="url(#shc)"/>`;
          const pad = 26,
            n = caps.length || 1,
            colW = (iW - pad * 2) / n;
          caps.forEach((c, i) => {
            const colx = iX + pad + i * colW,
              ry = iY + 20,
              tx0 = colx + 54;
            svg += iconBox(colx, ry, 42, c.ic, c.tint, c.col);
            svg += tx(tx0, ry + 18, c.h, {
              size: 20,
              weight: 800,
              fill: "#1b2c48",
              anchor: "start",
            });
            const enX = tx0 + measureText(c.h, 20, 800, false) + 12;
            if (c.en)
              svg += tx(enX, ry + 18, c.en, {
                size: 18,
                fill: c.col,
                anchor: "start",
                ls: 0.5,
              });
            (c.d || []).forEach((line, j) => {
              svg += tx(tx0, ry + 44 + j * 23, line, {
                size: 18,
                fill: "#4d5a75",
                anchor: "start",
              });
            });
            if (c.paren)
              svg += tx(tx0, ry + 44 + (c.d || []).length * 23 + 3, c.paren, {
                size: 18,
                fill: "#6c7896",
                anchor: "start",
              });
            // audit: every line in a capability column must stay within the column
            if (A) {
              const owX = tx0,
                owW = colx + colW - tx0 - 6,
                nm = `能力欄 ${i + 1}`;
              A.box(nm, "platform-panel 能力欄", colx, ry, colW, capBottom);
              // header sits at tx0; the en tag follows the measured header width, so
              // both — plus the description lines and paren — must fit the column.
              fitText(A, c.h, tx0, ry + 18, "start", 20, 800, false, owX, owW, nm);
              fitText(A, c.en, enX, ry + 18, "start", 18, 400, false,
                enX, colx + colW - 6 - enX, nm);
              (c.d || []).forEach((line, j) =>
                fitText(A, line, tx0, ry + 44 + j * 23, "start", 18, 400, false, owX, owW, nm));
              fitText(A, c.paren, tx0, ry + 44 + (c.d || []).length * 23 + 3,
                "start", 18, 400, false, owX, owW, nm);
            }
          });
          if (mem) {
            const dvY = iY + dvOffset;
            svg += `<line x1="${iX + pad}" y1="${dvY}" x2="${iX + iW - pad}" y2="${dvY}" stroke="#eef1f8" stroke-width="1.4"/>`;
            const mY = dvY + 18;
            svg += iconBox(iX + pad, mY, 42, mem.ic || "db", mem.tint || "#e3f6f1", mem.col || "#0fb39a");
            if (mem.h)
              svg += tx(iX + pad + 54, mY + 17, mem.h, {
                size: 20,
                weight: 800,
                fill: "#1b2c48",
                anchor: "start",
              });
            const memEnX = iX + pad + 54 + measureText(mem.h || "", 20, 800, false) + 12;
            if (mem.en)
              svg += tx(memEnX, mY + 17, mem.en, {
                size: 18,
                fill: mem.col || "#0fb39a",
                anchor: "start",
              });
            if (mem.d)
              svg += tx(iX + pad + 54, mY + 41, mem.d, {
                size: 18,
                fill: "#4d5a75",
                anchor: "start",
              });
            let px = iX + pad + 54;
            const py = mY + 57;
            const pillX0 = px;
            (mem.pills || []).forEach((lab) => {
              const p = pill(px, py, lab, "#eef0fc", "#5560c0", 18);
              svg += p.svg;
              px += p.w + 9;
            });
            // audit: memory caption + pills row must stay inside the inner card
            if (A) {
              const owX = iX + pad + 54,
                owW = iX + iW - pad - owX,
                nm = "記憶列";
              fitText(A, mem.h, iX + pad + 54, mY + 17, "start", 20, 800, false, owX, owW, nm);
              fitText(A, mem.en, memEnX, mY + 17, "start", 18, 400, false,
                memEnX, iX + iW - pad - memEnX, nm);
              fitText(A, mem.d, iX + pad + 54, mY + 41, "start", 18, 400, false, owX, owW, nm);
              if ((mem.pills || []).length)
                A.fit(
                  { x: iX + pad, w: iW - 2 * pad, name: nm },
                  { x: pillX0, y: py, w: px - 9 - pillX0, h: 28, label: "狀態標籤列" },
                );
            }
          }
          return {
            height: pH,
            svg,
            topPort: { x: ctx.cx, y: ctx.y },
            bottomPorts: [{ x: ctx.cx, y: ctx.y + pH }],
          };
        },

        "api-node"(sec, ctx) {
          const r = sec.r || 34,
            color = sec.color || "#f5901f",
            txtCol = sec.textColor || "#ef7a1f";
          const cx = ctx.cx,
            cy = ctx.y + r;
          const labels = Array.isArray(sec.label) ? sec.label : [sec.label || "API"];
          let svg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#ffffff" stroke="${color}" stroke-width="2.4" filter="url(#shc)"/>`;
          if (labels.length > 1) {
            svg += tx(cx, cy - 4, labels[0], { size: 18, weight: 800, fill: txtCol });
            svg += tx(cx, cy + 17, labels[1], { size: 18, fill: txtCol });
          } else {
            svg += tx(cx, cy + 6, labels[0], { size: 18, weight: 800, fill: txtCol });
          }
          // audit: each label line must fit inside the circle (≈ diameter minus padding)
          if (ctx.audit)
            labels.forEach((lab, k) =>
              fitText(ctx.audit, lab, cx, cy + (labels.length > 1 ? (k ? 17 : -4) : 6),
                "middle", 18, k ? 400 : 800, false, cx - r + 6, 2 * r - 12, "API 節點"));
          return {
            height: 2 * r,
            svg,
            topPort: { x: cx, y: ctx.y },
            bottomPorts: [{ x: cx, y: cy + r }],
          };
        },

        "provider-bar"(sec, ctx) {
          const bH = sec.barH || 108;
          const x = ctx.x,
            y = ctx.y,
            w = ctx.w;
          const brand = sec.brand || {};
          const bcol = brand.col || "#f5811f";
          const A = ctx.audit;
          let svg = `<rect x="${x}" y="${y}" width="${w}" height="${bH}" rx="20" fill="url(#bar)" stroke="#ffd9bd" stroke-width="1.4"/>`;
          svg += glassTile(x + 28, y + bH / 2 - 24, 48, 14, bcol);
          svg += icon(brand.ic || "sparkles", x + 52, y + bH / 2, 16, brand.iconCol || "#ef7a25", 2.0);
          if (brand.h)
            svg += tx(x + 94, y + bH / 2 - 7, brand.h, {
              size: 21,
              weight: 800,
              fill: brand.titleCol || "#7a3d10",
              anchor: "start",
            });
          if (brand.sub)
            svg += tx(x + 94, y + bH / 2 + 17, brand.sub, {
              size: 18,
              fill: brand.subCol || "#a06a35",
              anchor: "start",
            });
          const items = sec.items || [];
          const cw = sec.chipW || 162;
          const aStart = x + (sec.chipsStart || 440),
            aEnd = x + w - 26,
            slot = (aEnd - aStart) / (items.length || 1);
          // audit: brand caption must not run into the chip area
          if (A) {
            fitText(A, brand.h, x + 94, y + bH / 2 - 7, "start", 21, 800, false,
              x + 94, aStart - cw / 2 - (x + 94), "供應商品牌");
            fitText(A, brand.sub, x + 94, y + bH / 2 + 17, "start", 18, 400, false,
              x + 94, aStart - cw / 2 - (x + 94), "供應商品牌");
          }
          items.forEach((p, i) => {
            const ccx = aStart + slot * (i + 0.5),
              cx0 = ccx - cw / 2,
              cy0 = y + bH / 2 - 26;
            // audit: chips must not overlap; chip name must fit the chip
            if (A) {
              const cnm = `供應商晶片 ${i + 1}`;
              A.box(p.name || cnm, "provider-bar 晶片", cx0, cy0, cw, 52);
              if (!p.more)
                fitText(A, p.name, cx0 + 56, cy0 + 33, "start", 18, 800, false,
                  cx0 + 56, cw - 56 - 10, cnm);
              else
                fitText(A, "＋ " + p.name, ccx, cy0 + 33, "middle", 18, 700, false,
                  cx0 + 8, cw - 16, cnm);
            }
            if (p.more) {
              svg += `<rect x="${cx0}" y="${cy0}" width="${cw}" height="52" rx="14" fill="none" stroke="#e6b48a" stroke-width="1.6" stroke-dasharray="6 5"/>`;
              svg += tx(ccx, cy0 + 33, "＋ " + p.name, {
                size: 18,
                weight: 700,
                fill: "#a06a35",
              });
            } else {
              svg += `<rect x="${cx0}" y="${cy0}" width="${cw}" height="52" rx="14" fill="#ffffff" stroke="#ffe0c6" stroke-width="1.4" filter="url(#shc)"/>`;
              svg += glassTile(cx0 + 12, cy0 + 10, 32, 9, p.g);
              svg += tx(cx0 + 28, cy0 + 32, p.logo, { size: 18, weight: 800, fill: p.g });
              svg += tx(cx0 + 56, cy0 + 33, p.name, {
                size: 18,
                weight: 800,
                fill: "#5a3b1e",
                anchor: "start",
              });
            }
          });
          return {
            height: bH,
            svg,
            topPort: { x: ctx.cx, y: ctx.y },
            bottomPorts: [{ x: ctx.cx, y: ctx.y + bH }],
          };
        },
      };

      // ============================ CONNECTORS ============================
      // Drawn in the gap BELOW a section, selected by that section's `connect`.
      // (fromPorts, toPort, cctx) => svg string. cctx = { x, w, cx, fromY, toPort }.
      const CONNECTORS = {
        "arrows-down"(fromPorts, toPort, cctx) {
          let svg = "";
          (fromPorts || []).forEach((p) => {
            svg += `<path d="M${p.x} ${p.y} L${p.x} ${p.y + 13} M${p.x - 5} ${p.y + 7} L${p.x} ${p.y + 14} L${p.x + 5} ${p.y + 7}" fill="none" stroke="#9fb6e2" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;
          });
          return svg;
        },
        "dashed-converge"(fromPorts, toPort, cctx) {
          const xs = [cctx.x + cctx.w * 0.28, cctx.cx, cctx.x + cctx.w * 0.72];
          const y0 = cctx.fromY;
          let svg = "";
          xs.forEach((sx) => {
            svg += `<path d="M${sx} ${y0} C ${sx} ${toPort.y - 18}, ${toPort.x} ${toPort.y - 18}, ${toPort.x} ${toPort.y - 6}" fill="none" stroke="#f5a84a" stroke-width="2" stroke-dasharray="5 5"/>`;
          });
          return svg;
        },
        "dashed-line"(fromPorts, toPort, cctx) {
          const f = (fromPorts && fromPorts[0]) || { x: toPort.x, y: cctx.fromY };
          return `<path d="M${f.x} ${f.y} L${toPort.x} ${toPort.y}" fill="none" stroke="#f5a84a" stroke-width="2" stroke-dasharray="5 5"/>`;
        },
        none() {
          return "";
        },
      };

      // ============================ BUILD ============================
      function build() {
        const m = config.meta;
        const W = m.width || 1440,
          PAD = m.pad == null ? 30 : m.pad,
          M = m.margin == null ? 40 : m.margin,
          GAP = m.gap == null ? 28 : m.gap,
          accent = m.accent || "#3b6fe0";
        const x = M,
          w = W - 2 * M,
          cx = W / 2;
        let y = 30; // top margin inside artwork
        const audit = newAudit();
        const rendered = [];
        (config.sections || []).forEach((sec) => {
          const fn = SECTIONS[sec.type];
          if (!fn) {
            console.warn(`[platform] unknown section type: "${sec.type}"`);
            return;
          }
          const r = fn(sec, { x, y, w, cx, W, M, accent, audit });
          rendered.push({ sec, r, top: y });
          // audit: stacked sections must not overlap vertically
          audit.box(sec.type, "section 區段", x, y, w, r.height);
          y += r.height + GAP;
        });
        const H = y - GAP + 30; // drop the trailing gap, add bottom margin

        // connectors between consecutive sections (drawn beneath the sections)
        let conn = "";
        for (let i = 0; i < rendered.length - 1; i++) {
          const a = rendered[i],
            b = rendered[i + 1];
          const cfn = CONNECTORS[a.sec.connect || "none"];
          if (!cfn) continue;
          conn += cfn(a.r.bottomPorts, b.r.topPort, {
            x,
            w,
            cx,
            fromY: a.top + a.r.height,
            toPort: b.r.topPort,
          });
        }

        let s = `<svg xmlns="${NS}" viewBox="${-PAD} ${-PAD} ${W + PAD * 2} ${H + PAD * 2}" width="${W + PAD * 2}" height="${H + PAD * 2}" font-family="${SANS}">`;
        s += DEFS;
        s += `<rect x="${-PAD}" y="${-PAD}" width="${W + PAD * 2}" height="${H + PAD * 2}" fill="#ffffff"/>`;
        s += `<rect width="${W}" height="${H}" rx="18" fill="#ffffff"/>`;
        s += conn;
        rendered.forEach((o) => (s += o.r.svg));
        s += `</svg>`;
        return { svg: s, W, H, PAD, audit };
      }

      // ============================ RENDER + EXPORT ============================
      let ART = { svg: "", W: 0, H: 0, PAD: 0, audit: null };
      function render() {
        document.title = config.meta.title || "Platform Architecture Poster";
        document.getElementById("hint").textContent = config.meta.hint || "";
        ART = build();
        document.getElementById("stage").innerHTML = ART.svg;
      }
      render();

      // ============================ AUDIT RUNNER ============================
      const baseHint = () => config.meta.hint || "";
      function clearAuditHL() {
        document.querySelectorAll("#stage .audit-hl").forEach((e) => e.remove());
      }
      function paintAuditHL(conflicts) {
        clearAuditHL();
        const svg = document.querySelector("#stage svg");
        if (!svg) return;
        conflicts.forEach((c) => {
          const r = c.rect,
            el = document.createElementNS(NS, "rect");
          el.setAttribute("class", "audit-hl");
          el.setAttribute("x", r.x - 3);
          el.setAttribute("y", r.y - 3);
          el.setAttribute("width", Math.max(6, r.w + 6));
          el.setAttribute("height", Math.max(6, r.h + 6));
          el.setAttribute("rx", 4);
          el.setAttribute("fill", "none");
          el.setAttribute("stroke", c.kind === "overflow" ? "#e53935" : "#d81b60");
          el.setAttribute("stroke-width", 2.5);
          el.setAttribute("stroke-dasharray", "5 4");
          svg.appendChild(el);
        });
      }
      // Evaluate the current build's audit records. announce=true → alert + red overlays.
      function auditLayout(opts = {}) {
        const res = evalAudit(ART.audit || newAudit());
        const hint = document.getElementById("hint");
        if (res.ok) {
          console.log("%c✓ 版面檢查：無溢出或重疊", "color:#0a8a0a;font-weight:700");
          hint.textContent = baseHint() + " · ✓ 版面 OK";
          if (opts.announce) {
            clearAuditHL();
            alert("✓ 版面檢查：無溢出或重疊");
          }
        } else {
          console.warn(`⚑ 版面檢查：${res.count} 個問題`);
          console.table(res.conflicts.map((c) => ({ 類型: c.kind, 說明: c.msg })));
          hint.textContent = baseHint() + ` · ⚑ ${res.count} 個版面問題`;
          if (opts.announce) {
            paintAuditHL(res.conflicts);
            alert(
              `⚑ 發現 ${res.count} 個版面問題：\n\n` +
                res.conflicts.map((c) => "• " + c.msg).join("\n") +
                "\n\n紅框已標示於圖上；請縮短文字或減少項目後重整。",
            );
          }
        }
        return res;
      }
      auditLayout(); // run on load: log + hint badge, no popup
      document.getElementById("audit").onclick = () => {
        // toggle: if highlights are showing, clear them; otherwise run + announce
        if (document.querySelector("#stage .audit-hl")) {
          clearAuditHL();
          document.getElementById("hint").textContent = baseHint();
        } else {
          auditLayout({ announce: true });
        }
      };

      function svgStr() {
        clearAuditHL(); // never bake audit overlays into an export
        return (
          '<?xml version="1.0" encoding="UTF-8"?>\n' +
          document.querySelector("#stage svg").outerHTML
        );
      }
      function dl(blob, name) {
        const u = URL.createObjectURL(blob),
          a = document.createElement("a");
        a.href = u;
        a.download = name;
        a.click();
        setTimeout(() => URL.revokeObjectURL(u), 1000);
      }
      const fileName = () => config.meta.fileName || "platform-architecture";
      document.getElementById("svg").onclick = () =>
        dl(new Blob([svgStr()], { type: "image/svg+xml" }), fileName() + ".svg");
      document.getElementById("png").onclick = () => {
        const xml = svgStr(),
          img = new Image();
        img.onload = () => {
          const sc = 2,
            c = document.createElement("canvas");
          c.width = (ART.W + ART.PAD * 2) * sc;
          c.height = (ART.H + ART.PAD * 2) * sc;
          const ctx = c.getContext("2d");
          ctx.scale(sc, sc);
          ctx.drawImage(img, 0, 0, ART.W + ART.PAD * 2, ART.H + ART.PAD * 2);
          c.toBlob((b) => dl(b, fileName() + ".png"), "image/png");
        };
        img.src =
          "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));
      };
    </script>
  </body>
</html>
