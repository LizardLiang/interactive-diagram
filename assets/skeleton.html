<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Diagram — Skeleton</title>
    <!--
      ============================================================================
      INTERACTIVE-DIAGRAM SKELETON
      ----------------------------------------------------------------------------
      A self-contained starting point for the Interactive-diagram skill. Pure
      HTML + CSS + vanilla JS. No frameworks, no CDN, no build step.

      Fill in only the CONFIG block; the rest of the machinery is generic.

      The headline feature lives in the "LAYOUT GUARD" section: a single module
      that audits and resolves overlap across the FOUR element categories the
      diagram is made of —

          1. BLOCKS    — node rectangles / diamonds
          2. LABELS    — text that rides on the arrow (edge) lines
          3. TITLES    — section / band / swimlane captions
          4. SECTORS   — the container rectangles grouping nodes

      Layout.run() resolves collisions; Layout.audit() proves none remain and
      logs a table of any it could not fix. Containment (a node living INSIDE its
      sector, a title belonging to its sector, bands crossing swimlanes) is by
      design and is NOT reported as a collision — see Layout.POLICY.
      ============================================================================
    -->
    <style>
      /* === THEME ============================================================ */
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --fg: #0f172a;
        --fg-muted: #64748b;
        --edge: #94a3b8;
        --border: #e2e8f0;
        --shadow: rgba(0, 0, 0, 0.08);
        --panel-bg: #ffffff;
        --overlay: rgba(0, 0, 0, 0.3);
        --legend-bg: rgba(255, 255, 255, 0.9);

        --c-client: #3b82f6;
        --c-http: #1e3a8a;
        --c-worker: #15803d;
        --c-infra: #374151;
        --c-db: #1f2937;
        --c-external: #dc2626;
        --c-queue: #7c3aed;

        --c-client-fill: #dbeafe;
        --c-http-fill: #e0e7ff;
        --c-worker-fill: #dcfce7;
        --c-infra-fill: #f1f5f9;
        --c-db-fill: #e5e7eb;
        --c-external-fill: #fee2e2;
        --c-queue-fill: #ede9fe;
      }
      [data-theme="dark"] {
        --bg: #0f172a;
        --surface: #1e293b;
        --fg: #e2e8f0;
        --fg-muted: #94a3b8;
        --edge: #475569;
        --border: #334155;
        --shadow: rgba(0, 0, 0, 0.5);
        --panel-bg: #1e293b;
        --overlay: rgba(0, 0, 0, 0.55);
        --legend-bg: rgba(22, 34, 50, 0.96);

        --c-client: #7bafd4;
        --c-http: #8897cc;
        --c-worker: #5ea87a;
        --c-infra: #7a8898;
        --c-db: #8292a8;
        --c-external: #f87171;
        --c-queue: #9080c0;

        --c-client-fill: #1a2d42;
        --c-http-fill: #1c2240;
        --c-worker-fill: #152a1c;
        --c-infra-fill: #1e2535;
        --c-db-fill: #141c28;
        --c-external-fill: #2d1212;
        --c-queue-fill: #1e1832;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: var(--bg);
        color: var(--fg);
        height: 100vh;
        overflow: hidden;
        user-select: none;
      }

      /* === TOOLBAR ========================================================== */
      #toolbar {
        position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 6px; align-items: center;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; padding: 8px 12px;
        box-shadow: 0 4px 20px var(--shadow); z-index: 100;
      }
      #toolbar h1 { font-size: 13px; font-weight: 600; margin-right: 8px; white-space: nowrap; }
      .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
      .tb-btn {
        background: none; border: 1px solid var(--border); border-radius: 7px;
        padding: 5px 10px; font-size: 12px; color: var(--fg); cursor: pointer;
        transition: background 0.15s; white-space: nowrap;
      }
      .tb-btn:hover { background: var(--border); }

      /* === CANVAS =========================================================== */
      #canvas { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; }
      #canvas:active { cursor: grabbing; }
      #canvas svg { width: 100%; height: 100%; }

      /* === LEGEND =========================================================== */
      #legend {
        position: fixed; bottom: 16px; left: 16px;
        background: var(--legend-bg); border: 1px solid var(--border);
        border-radius: 10px; padding: 12px 14px; font-size: 11px; z-index: 50;
        box-shadow: 0 4px 16px var(--shadow); backdrop-filter: blur(8px);
      }
      #legend h3 {
        font-size: 11px; font-weight: 600; color: var(--fg-muted);
        margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
      }
      .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
      .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

      /* === SIDE PANEL ======================================================= */
      #panel-backdrop { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 200; }
      #panel-backdrop.open { display: block; }
      #side-panel {
        position: fixed; top: 0; right: -440px; width: 420px; height: 100vh;
        background: var(--panel-bg); border-left: 1px solid var(--border);
        box-shadow: -8px 0 32px var(--shadow); z-index: 201;
        transition: right 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto; padding: 28px 24px;
      }
      #side-panel.open { right: 0; }
      #panel-close {
        position: absolute; top: 16px; right: 16px; background: none;
        border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px;
        cursor: pointer; font-size: 16px; color: var(--fg-muted);
        display: flex; align-items: center; justify-content: center;
      }
      #panel-type-badge {
        display: inline-block; font-size: 11px; font-weight: 600;
        padding: 3px 9px; border-radius: 20px; margin-bottom: 10px;
      }
      #panel-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
      #panel-desc { font-size: 14px; color: var(--fg-muted); line-height: 1.7; margin-bottom: 18px; white-space: pre-wrap; }
      .panel-section { margin-bottom: 16px; }
      .panel-section h4 {
        font-size: 11px; font-weight: 600; color: var(--fg-muted);
        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
      }
      .panel-tag { display: inline-block; background: var(--border); border-radius: 6px; padding: 3px 9px; font-size: 12px; margin: 2px; }
      .panel-resp-item { font-size: 13px; line-height: 1.6; padding: 5px 0; border-bottom: 1px solid var(--border); }
      .panel-resp-item:last-child { border-bottom: none; }

      .node-group, .edge-group { transition: opacity 0.18s; }
      .dimmed { opacity: 0.12; }
    </style>
  </head>

  <body>
    <div id="toolbar">
      <h1>Diagram</h1>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-zoom-in">＋ Zoom in</button>
      <button class="tb-btn" id="btn-zoom-out">－ Zoom out</button>
      <button class="tb-btn" id="btn-fit">⊡ Fit</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-theme">◐ Dark</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-audit">⚑ Audit overlap</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-svg">↓ SVG</button>
      <button class="tb-btn" id="btn-png">↓ PNG</button>
    </div>

    <div id="canvas"><svg id="svg-root" xmlns="http://www.w3.org/2000/svg"></svg></div>

    <div id="legend"><h3>Node types</h3><div id="legend-items"></div></div>

    <div id="panel-backdrop"></div>
    <div id="side-panel">
      <button id="panel-close">✕</button>
      <div id="panel-type-badge"></div>
      <div id="panel-title"></div>
      <div id="panel-desc"></div>
      <div id="panel-tech-section" class="panel-section"><h4>Tech</h4><div id="panel-tech"></div></div>
      <div id="panel-resp-section" class="panel-section"><h4>Responsibilities</h4><div id="panel-resp"></div></div>
    </div>

    <script>
      const SVG_NS = "http://www.w3.org/2000/svg";

      // =====================================================================
      // === CONFIG ===  Edit ONLY this object to change the whole picture. ==
      // =====================================================================
      // x / y / w / h are STARTING HINTS. Layout.run() finalizes them so that
      // nothing in the four categories overlaps. Give every node a `sector`
      // (the id of the container it belongs to) so the guard can keep it inside.
      const diagram = {
        type: "system",

        // SECTORS — container rectangles. orient drives how fitSectors grows them:
        //   "band" = full-width horizontal stripe (height fixed, x/width auto)
        //   "lane" = full-height vertical column   (width fixed, y/height auto)
        //   "box"  = free rectangle that hugs its members on all sides
        // title.side: where the caption sits ("top" | "above" | "left").
        sectors: [
          { id: "client",  label: "Client tier",  orient: "band", color: "#3b82f6", title: { side: "above" } },
          { id: "backend", label: "Backend tier", orient: "band", color: "#15803d", title: { side: "above" } },
          { id: "data",    label: "Data tier",    orient: "band", color: "#1f2937", title: { side: "above" } },
        ],

        nodes: [
          { id: "browser", sector: "client", type: "client", x: 120, y: 120, w: 220, h: 90,
            label: "Browser\n(SPA)",
            description: "The user-facing single-page app. Talks to the API over HTTPS and streams updates over SSE.",
            tech: ["React", "EventSource"],
            responsibilities: ["Render UI", "POST user actions", "Subscribe to SSE stream"] },
          { id: "api", sector: "backend", type: "http", x: 120, y: 360, w: 220, h: 90,
            label: "API service",
            description: "Thin HTTP layer. Validates requests, enqueues work, returns 202 immediately.",
            tech: ["ASP.NET Core"],
            responsibilities: ["Auth + validation", "Enqueue work", "Stream SSE back"] },
          { id: "worker", sector: "backend", type: "worker", x: 420, y: 360, w: 220, h: 90,
            label: "Worker\n(BackgroundService)",
            description: "Drains the queue and runs the long-lived job, writing results to the store.",
            tech: ["IHostedService"],
            responsibilities: ["Dequeue jobs", "Run async loop", "Persist results"] },
          { id: "db", sector: "data", type: "db", x: 120, y: 600, w: 220, h: 90,
            label: "Database",
            description: "Append-only event log + relational tables.",
            tech: ["PostgreSQL"],
            responsibilities: ["Persist state", "Serve reads"] },
        ],

        edges: [
          { from: "browser", to: "api",    label: "POST /action", style: "sync" },
          { from: "api",     to: "browser", label: "202 Accepted", style: "dashed", bendDir: -1 },
          { from: "api",     to: "worker", label: "enqueue",      style: "async" },
          { from: "worker",  to: "db",     label: "write result", style: "sync" },
          { from: "db",      to: "worker", label: "load history", style: "dashed", bendDir: -1 },
        ],
      };

      // Color lookup by node type — the persistent color schema. Each entry
      // maps to a CSS custom property pair so dark mode is a one-attribute flip.
      const TYPE = {
        client:   { stroke: "var(--c-client)",   fill: "var(--c-client-fill)" },
        http:     { stroke: "var(--c-http)",     fill: "var(--c-http-fill)" },
        worker:   { stroke: "var(--c-worker)",   fill: "var(--c-worker-fill)" },
        infra:    { stroke: "var(--c-infra)",    fill: "var(--c-infra-fill)" },
        queue:    { stroke: "var(--c-queue)",    fill: "var(--c-queue-fill)" },
        db:       { stroke: "var(--c-db)",       fill: "var(--c-db-fill)" },
        external: { stroke: "var(--c-external)", fill: "var(--c-external-fill)" },
      };
      const TYPE_LABELS = {
        client: "Client", http: "HTTP / Controller", worker: "Worker / Service",
        infra: "Infra", queue: "Channel / Queue", db: "Database", external: "External API",
      };

      // =====================================================================
      // === LAYOUT GUARD ====================================================
      // The skeleton's core: distance / overlap checking across the four
      // element categories. Pure geometry — no rendering knowledge beyond the
      // accessor functions registered during RENDER.
      //
      //   Layout.run()   — resolve collisions (call BEFORE applying the viewBox)
      //   Layout.audit() — return + log a report of any overlaps that remain
      //
      // Element kinds: 'node' | 'label' | 'title' | 'sector'.
      // =====================================================================
      const Layout = (() => {
        // --- geometry primitives -----------------------------------------
        // AABB = { x, y, w, h }. left/right/top/bottom helpers below.
        const L = (r) => r.x, R = (r) => r.x + r.w, T = (r) => r.y, B = (r) => r.y + r.h;
        const cx = (r) => r.x + r.w / 2, cy = (r) => r.y + r.h / 2;

        // CJK-aware text measurement. ASCII ≈ 0.55em, fullwidth/CJK ≈ 0.95em.
        // Mirrors the proven width heuristic from the reference diagrams.
        function measureText(str, fontSize = 13) {
          let max = 0;
          for (const line of String(str).split("\n")) {
            let w = 0;
            for (const ch of line) w += (ch.codePointAt(0) > 0x2000 ? 0.95 : 0.55) * fontSize;
            if (w > max) max = w;
          }
          return max;
        }
        function textBox(str, fontSize = 13, lineH = 16) {
          const lines = String(str).split("\n").length;
          return { w: measureText(str, fontSize), h: lines * lineH };
        }

        // Penetration depth of two boxes inflated by `gap`. Positive on both
        // axes ⇒ they overlap (or sit closer than `gap`).
        function penetration(a, b, gap = 0) {
          const ox = (a.w + b.w) / 2 + gap - Math.abs(cx(a) - cx(b));
          const oy = (a.h + b.h) / 2 + gap - Math.abs(cy(a) - cy(b));
          return { ox, oy };
        }
        function overlaps(a, b, gap = 0) {
          const p = penetration(a, b, gap);
          return p.ox > 0 && p.oy > 0;
        }
        // Is box `inner` fully contained within `outer` (with `pad` slack)?
        function contains(outer, inner, pad = 0) {
          return L(inner) >= L(outer) + pad && R(inner) <= R(outer) - pad &&
                 T(inner) >= T(outer) + pad && B(inner) <= B(outer) - pad;
        }

        // --- minimum clearance (px) between each category pair ------------
        const GAP = {
          node:  40, // SKILL.md hard rule: ≥40px between blocks
          label: 4,  // edge labels vs each other
          title: 8,
          mixed: 8,  // any cross-category pair not listed
        };
        // Conflict POLICY: which category pairs MUST NOT overlap. Containment
        // is intentional and therefore excluded:
        //   sector×node   — a node lives inside its sector (allowed)
        //   sector×title  — a title captions its sector (allowed)
        //   sector×sector — bands cross swimlanes by design (allowed)
        //   sector×label  — labels float over the band background (allowed)
        function isConflict(ka, kb) {
          if (ka === "sector" || kb === "sector") return false;
          return true; // node/label/title pairs all must stay clear
        }
        function gapFor(ka, kb) {
          if (ka === kb && GAP[ka] != null) return GAP[ka];
          return GAP.mixed;
        }

        // --- registry: RENDER pushes live accessors here ------------------
        // Each entry: { kind, id, get() -> box, set(box) }. get/set read and
        // write the *current* geometry so audit reflects post-drag state too.
        const reg = { node: [], label: [], title: [], sector: [] };
        function register(kind, id, get, set) { reg[kind].push({ kind, id, get, set }); }
        function clear() { for (const k in reg) reg[k] = []; }
        function all() { return [...reg.node, ...reg.label, ...reg.title, ...reg.sector]; }

        // --- node ↔ node collision push (SKILL.md "collision-push loop") --
        // Operates on diagram.nodes data BEFORE render. Pushes overlapping
        // pairs apart along the axis of least resistance.
        function resolveNodes(maxIter = 60) {
          const ns = diagram.nodes;
          for (let it = 0; it < maxIter; it++) {
            let moved = false;
            for (let i = 0; i < ns.length; i++) {
              for (let j = i + 1; j < ns.length; j++) {
                const a = ns[i], b = ns[j];
                const p = penetration(a, b, GAP.node);
                if (p.ox > 0 && p.oy > 0) {
                  if (p.ox < p.oy) {                 // push horizontally
                    const d = p.ox / 2 + 0.5;
                    if (cx(a) <= cx(b)) { a.x -= d; b.x += d; } else { a.x += d; b.x -= d; }
                  } else {                            // push vertically
                    const d = p.oy / 2 + 0.5;
                    if (cy(a) <= cy(b)) { a.y -= d; b.y += d; } else { a.y += d; b.y -= d; }
                  }
                  moved = true;
                }
              }
            }
            if (!moved) break;
          }
        }

        // --- grow sectors to contain their member nodes -------------------
        // band  → fixed height, spans full diagram width, y/h hug member rows
        // lane  → fixed width,  spans full diagram height, x/w hug member cols
        // box   → hugs members on all four sides
        function fitSectors(pad = 28) {
          diagram.sectors.forEach((s) => {
            const members = diagram.nodes.filter((n) => n.sector === s.id);
            if (!members.length) return;
            const minX = Math.min(...members.map(L)), maxX = Math.max(...members.map(R));
            const minY = Math.min(...members.map(T)), maxY = Math.max(...members.map(B));
            if (s.orient === "band") {
              // y/h hug the member rows; x/width set to diagram bounds below
              s.y = minY - pad; s.h = (maxY - minY) + pad * 2;
            } else if (s.orient === "lane") {
              s.x = minX - pad; s.w = (maxX - minX) + pad * 2;
            } else {
              s.x = minX - pad; s.y = minY - pad;
              s.w = (maxX - minX) + pad * 2; s.h = (maxY - minY) + pad * 2;
            }
          });
          // bands span the union width of all nodes; lanes span union height.
          const ns = diagram.nodes;
          const gx0 = Math.min(...ns.map(L)) - 60, gx1 = Math.max(...ns.map(R)) + 60;
          const gy0 = Math.min(...ns.map(T)) - 60, gy1 = Math.max(...ns.map(B)) + 60;
          diagram.sectors.forEach((s) => {
            if (s.orient === "band") { s.x = gx0; s.w = gx1 - gx0; }
            if (s.orient === "lane") { s.y = gy0; s.h = gy1 - gy0; }
          });
        }

        // --- place a sector title in clear space outside the band/box -----
        // Returns the title box; RENDER draws it and registers it.
        function titleBox(s, fontSize = 11) {
          const w = measureText(s.label, fontSize) + 24, h = 22;
          const side = (s.title && s.title.side) || "above";
          if (side === "above") return { x: cx(s) - w / 2, y: T(s) - h - 6, w, h };
          if (side === "left")  return { x: L(s) - w - 6,   y: cy(s) - h / 2, w, h };
          /* top (inside, top-left) */ return { x: L(s) + 8, y: T(s) + 6, w, h };
        }

        // --- edge-label vertical de-overlap (runs on DOM after render) ----
        // Same algorithm proven in the reference: nudge colliding label boxes
        // apart on the Y axis so each stays near its own edge.
        function resolveLabels(maxIter = 80) {
          const items = reg.label.map((e) => ({ e, b: e.get() })).filter((x) => x.b);
          for (let it = 0; it < maxIter; it++) {
            let moved = false;
            for (let i = 0; i < items.length; i++) {
              for (let j = i + 1; j < items.length; j++) {
                const a = items[i].b, b = items[j].b;
                const p = penetration(a, b, GAP.label);
                if (p.ox > 0 && p.oy > 0) {
                  const d = p.oy / 2 + 0.5;
                  if (cy(a) <= cy(b)) { a.y -= d; b.y += d; } else { a.y += d; b.y -= d; }
                  moved = true;
                }
              }
            }
            if (!moved) break;
          }
          items.forEach((x) => x.e.set(x.b));
        }

        // --- the auditor --------------------------------------------------
        // Walks every conflicting category pair and reports overlaps. Also
        // reports nodes that have spilled outside their declared sector.
        function audit({ log = true } = {}) {
          const conflicts = [];
          const items = all().map((e) => ({ ...e, box: e.get() })).filter((x) => x.box);

          for (let i = 0; i < items.length; i++) {
            for (let j = i + 1; j < items.length; j++) {
              const a = items[i], b = items[j];
              if (!isConflict(a.kind, b.kind)) continue;
              const g = gapFor(a.kind, b.kind);
              const p = penetration(a.box, b.box, g);
              if (p.ox > 0 && p.oy > 0) {
                conflicts.push({
                  type: "overlap",
                  a: `${a.kind}:${a.id}`, b: `${b.kind}:${b.id}`,
                  gap: g, overlapX: +p.ox.toFixed(1), overlapY: +p.oy.toFixed(1),
                });
              }
            }
          }
          // spill check: every node must sit fully inside its sector.
          reg.node.forEach((n) => {
            const node = diagram.nodes.find((d) => d.id === n.id);
            if (!node || !node.sector) return;
            const sec = reg.sector.find((s) => s.id === node.sector);
            if (sec && !contains(sec.get(), n.get(), 0)) {
              conflicts.push({ type: "spill", a: `node:${n.id}`, b: `sector:${node.sector}`, gap: 0, overlapX: "-", overlapY: "-" });
            }
          });

          const report = { ok: conflicts.length === 0, count: conflicts.length, conflicts };
          if (log) {
            if (report.ok) console.log("%c✓ Layout audit: no overlaps", "color:#15803d;font-weight:600");
            else {
              console.warn(`✗ Layout audit: ${report.count} conflict(s)`);
              if (console.table) console.table(conflicts);
              else conflicts.forEach((c) => console.warn(c));
            }
          }
          return report;
        }

        // --- orchestration ------------------------------------------------
        // Call the data-coord resolvers BEFORE render; resolveLabels AFTER.
        function run() { resolveNodes(); fitSectors(); }

        return {
          // primitives (exposed for custom layouts / tests)
          measureText, textBox, penetration, overlaps, contains, titleBox,
          // policy + registry
          POLICY: { GAP, isConflict, gapFor }, register, clear, reg,
          // resolvers + audit
          resolveNodes, fitSectors, resolveLabels, audit, run,
        };
      })();

      // =====================================================================
      // === RENDER ==========================================================
      // =====================================================================
      const state = { svg: null, vb: null, nodeEls: {}, edgeEls: [] };

      function svgEl(tag, attrs = {}) {
        const el = document.createElementNS(SVG_NS, tag);
        for (const k in attrs) el.setAttribute(k, attrs[k]);
        return el;
      }

      function mkDefs(svg) {
        const defs = svgEl("defs");
        ["sync", "async"].forEach((kind) => {
          const m = svgEl("marker", {
            id: `arrow-${kind}`, viewBox: "0 0 10 10", refX: "9", refY: "5",
            markerWidth: "7", markerHeight: "7", orient: "auto-start-reverse",
          });
          m.appendChild(svgEl("path", { d: "M0,0 L10,5 L0,10 z", fill: "var(--edge)" }));
          defs.appendChild(m);
        });
        const f = svgEl("filter", { id: "shadow", x: "-20%", y: "-20%", width: "140%", height: "140%" });
        f.appendChild(svgEl("feDropShadow", { dx: "0", dy: "2", stdDeviation: "3", "flood-color": "#000", "flood-opacity": "0.18" }));
        defs.appendChild(f);
        svg.appendChild(defs);
      }

      function nodeBox(id) {
        const n = diagram.nodes.find((d) => d.id === id);
        return { x: n.x, y: n.y, w: n.w, h: n.h };
      }
      // port on the edge of a node box, picking the side facing the other node
      function port(fromId, toId, isFrom) {
        const a = nodeBox(fromId), b = nodeBox(toId);
        const ax = a.x + a.w / 2, ay = a.y + a.h / 2, bx = b.x + b.w / 2, by = b.y + b.h / 2;
        const me = isFrom ? a : b, mx = isFrom ? ax : bx, my = isFrom ? ay : by;
        const dx = (isFrom ? bx - ax : ax - bx), dy = (isFrom ? by - ay : ay - by);
        if (Math.abs(dx) > Math.abs(dy))
          return { x: dx > 0 ? me.x + me.w : me.x, y: my };
        return { x: mx, y: dy > 0 ? me.y + me.h : me.y };
      }
      function curve(p1, p2, bend = 1) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        const nx = -(p2.y - p1.y), ny = p2.x - p1.x;
        const len = Math.hypot(nx, ny) || 1;
        const off = 28 * bend;
        return `M${p1.x},${p1.y} Q${mx + (nx / len) * off},${my + (ny / len) * off} ${p2.x},${p2.y}`;
      }

      function renderEdge(edge, idx) {
        const g = svgEl("g"); g.classList.add("edge-group"); g.dataset.idx = idx;
        const p1 = port(edge.from, edge.to, true), p2 = port(edge.from, edge.to, false);
        const d = curve(p1, p2, edge.bendDir || 1);
        const path = svgEl("path", {
          d, fill: "none", stroke: "var(--edge)", "stroke-width": "2",
          "marker-end": `url(#arrow-${edge.style === "async" ? "async" : "sync"})`,
          ...(edge.style === "dashed" ? { "stroke-dasharray": "6 5" } : {}),
        });
        g.appendChild(path);

        let bg = null, txt = null;
        if (edge.label) {
          const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
          const w = Layout.measureText(edge.label, 11) + 14;
          bg = svgEl("rect", { x: mx - w / 2, y: my - 11, width: w, height: 19, rx: 5, fill: "var(--bg)", opacity: "0.92" });
          txt = svgEl("text", { x: mx, y: my + 3, "text-anchor": "middle", "font-size": "11", fill: "var(--fg-muted)" });
          txt.textContent = edge.label;
          g.appendChild(bg); g.appendChild(txt);

          // register the label box with the guard (live get/set on the DOM)
          Layout.register("label", `${edge.from}->${edge.to}#${idx}`,
            () => ({ x: +bg.getAttribute("x"), y: +bg.getAttribute("y"), w: +bg.getAttribute("width"), h: 19 }),
            (box) => {
              bg.setAttribute("x", box.x); bg.setAttribute("y", box.y);
              txt.setAttribute("x", box.x + box.w / 2); txt.setAttribute("y", box.y + 14);
            });
        }
        state.edgeEls[idx] = { g, path, bg, txt };
        return g;
      }

      function renderNode(node) {
        const c = TYPE[node.type] || TYPE.worker;
        const g = svgEl("g"); g.classList.add("node-group"); g.dataset.id = node.id; g.style.cursor = "pointer";
        g.appendChild(svgEl("rect", {
          x: node.x, y: node.y, width: node.w, height: node.h, rx: 12,
          fill: c.fill, stroke: c.stroke, "stroke-width": "2", filter: "url(#shadow)",
        }));
        const lines = node.label.split("\n"), lineH = 18;
        const startY = node.y + node.h / 2 - ((lines.length - 1) * lineH) / 2 + 5;
        lines.forEach((line, i) => {
          const t = svgEl("text", {
            x: node.x + node.w / 2, y: startY + i * lineH, "text-anchor": "middle",
            "font-size": "13", "font-weight": "600", fill: "var(--fg)",
          });
          t.textContent = line; g.appendChild(t);
        });
        state.nodeEls[node.id] = g;

        // register the node box (live: reads the data, which drag updates)
        Layout.register("node", node.id,
          () => ({ x: node.x, y: node.y, w: node.w, h: node.h }),
          (box) => { node.x = box.x; node.y = box.y; });
        return g;
      }

      function renderSector(s) {
        const g = svgEl("g");
        g.appendChild(svgEl("rect", {
          x: s.x, y: s.y, width: s.w, height: s.h, rx: 16, fill: "none",
          stroke: s.color, "stroke-width": "1.5", "stroke-dasharray": "9 5", opacity: "0.30",
        }));
        // title pill, placed by the guard in clear space
        const tb = Layout.titleBox(s, 11);
        g.appendChild(svgEl("rect", { x: tb.x, y: tb.y, width: tb.w, height: tb.h, rx: 6, fill: "var(--surface)", stroke: s.color, "stroke-width": "1.5", opacity: "0.97" }));
        const t = svgEl("text", { x: tb.x + tb.w / 2, y: tb.y + 15, "text-anchor": "middle", "font-size": "11", "font-weight": "600", fill: "var(--fg)" });
        t.textContent = s.label; g.appendChild(t);

        // register sector + its title so the auditor can see them
        Layout.register("sector", s.id, () => ({ x: s.x, y: s.y, w: s.w, h: s.h }));
        Layout.register("title", s.id, () => ({ x: tb.x, y: tb.y, w: tb.w, h: tb.h }));
        return g;
      }

      function updateEdges() {
        diagram.edges.forEach((edge, idx) => {
          const rec = state.edgeEls[idx]; if (!rec) return;
          const p1 = port(edge.from, edge.to, true), p2 = port(edge.from, edge.to, false);
          rec.path.setAttribute("d", curve(p1, p2, edge.bendDir || 1));
          if (rec.bg && rec.txt) {
            const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
            const w = +rec.bg.getAttribute("width");
            rec.bg.setAttribute("x", mx - w / 2); rec.bg.setAttribute("y", my - 11);
            rec.txt.setAttribute("x", mx); rec.txt.setAttribute("y", my + 3);
          }
        });
      }

      // =====================================================================
      // === INTERACTIONS ====================================================
      // =====================================================================
      function svgPoint(clientX, clientY) {
        const r = state.svg.getBoundingClientRect();
        return {
          x: state.vb.x + ((clientX - r.left) / r.width) * state.vb.w,
          y: state.vb.y + ((clientY - r.top) / r.height) * state.vb.h,
        };
      }
      function applyViewBox() {
        state.svg.setAttribute("viewBox", `${state.vb.x} ${state.vb.y} ${state.vb.w} ${state.vb.h}`);
      }
      function fit() {
        const items = Layout.reg.node.map((e) => e.get()).concat(Layout.reg.sector.map((e) => e.get()));
        const minX = Math.min(...items.map((b) => b.x)), minY = Math.min(...items.map((b) => b.y));
        const maxX = Math.max(...items.map((b) => b.x + b.w)), maxY = Math.max(...items.map((b) => b.y + b.h));
        const pad = 60;
        state.vb = { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
        applyViewBox();
      }
      function zoom(factor, cxp, cyp) {
        const c = (cxp == null) ? { x: state.vb.x + state.vb.w / 2, y: state.vb.y + state.vb.h / 2 } : svgPoint(cxp, cyp);
        state.vb.w *= factor; state.vb.h *= factor;
        state.vb.x = c.x - (c.x - state.vb.x) * factor;
        state.vb.y = c.y - (c.y - state.vb.y) * factor;
        applyViewBox();
      }

      function wireInteractions() {
        const canvas = document.getElementById("canvas");
        let panning = false, dragNode = null, last = null, downAt = null;

        canvas.addEventListener("pointerdown", (e) => {
          const ng = e.target.closest(".node-group");
          downAt = { x: e.clientX, y: e.clientY };
          if (ng) { dragNode = diagram.nodes.find((n) => n.id === ng.dataset.id); }
          else { panning = true; }
          last = { x: e.clientX, y: e.clientY };
          canvas.setPointerCapture(e.pointerId);
        });
        canvas.addEventListener("pointermove", (e) => {
          if (!last) return;
          const dx = e.clientX - last.x, dy = e.clientY - last.y;
          if (dragNode) {
            const sx = state.vb.w / state.svg.getBoundingClientRect().width;
            const sy = state.vb.h / state.svg.getBoundingClientRect().height;
            dragNode.x += dx * sx; dragNode.y += dy * sy;
            redrawNode(dragNode); updateEdges();
          } else if (panning) {
            const sx = state.vb.w / state.svg.getBoundingClientRect().width;
            const sy = state.vb.h / state.svg.getBoundingClientRect().height;
            state.vb.x -= dx * sx; state.vb.y -= dy * sy; applyViewBox();
          }
          last = { x: e.clientX, y: e.clientY };
        });
        canvas.addEventListener("pointerup", (e) => {
          const moved = downAt && (Math.abs(e.clientX - downAt.x) + Math.abs(e.clientY - downAt.y) > 4);
          const ng = e.target.closest(".node-group");
          if (!moved && ng) openPanel(diagram.nodes.find((n) => n.id === ng.dataset.id));
          dragNode = null; panning = false; last = null;
        });
        canvas.addEventListener("wheel", (e) => { e.preventDefault(); zoom(e.deltaY > 0 ? 1.1 : 0.9, e.clientX, e.clientY); }, { passive: false });

        // hover highlight
        diagram.nodes.forEach((n) => {
          state.nodeEls[n.id].addEventListener("mouseenter", () => highlight(n.id));
          state.nodeEls[n.id].addEventListener("mouseleave", clearHighlight);
        });

        document.getElementById("btn-zoom-in").onclick = () => zoom(0.85);
        document.getElementById("btn-zoom-out").onclick = () => zoom(1.18);
        document.getElementById("btn-fit").onclick = fit;
        document.getElementById("btn-theme").onclick = toggleTheme;
        document.getElementById("btn-audit").onclick = () => {
          const r = Layout.audit();
          alert(r.ok ? "✓ No overlaps." : `✗ ${r.count} conflict(s) — see console.`);
        };
        document.getElementById("btn-svg").onclick = exportSVG;
        document.getElementById("btn-png").onclick = exportPNG;
        document.getElementById("panel-close").onclick = closePanel;
        document.getElementById("panel-backdrop").onclick = closePanel;
      }

      function redrawNode(node) {
        const g = state.nodeEls[node.id];
        const rect = g.querySelector("rect");
        rect.setAttribute("x", node.x); rect.setAttribute("y", node.y);
        const lines = node.label.split("\n"), lineH = 18;
        const startY = node.y + node.h / 2 - ((lines.length - 1) * lineH) / 2 + 5;
        g.querySelectorAll("text").forEach((t, i) => {
          t.setAttribute("x", node.x + node.w / 2); t.setAttribute("y", startY + i * lineH);
        });
      }

      function neighbors(id) {
        const s = new Set([id]);
        diagram.edges.forEach((e) => { if (e.from === id) s.add(e.to); if (e.to === id) s.add(e.from); });
        return s;
      }
      function highlight(id) {
        const keep = neighbors(id);
        diagram.nodes.forEach((n) => state.nodeEls[n.id].classList.toggle("dimmed", !keep.has(n.id)));
        diagram.edges.forEach((e, i) => state.edgeEls[i].g.classList.toggle("dimmed", !(e.from === id || e.to === id)));
      }
      function clearHighlight() {
        diagram.nodes.forEach((n) => state.nodeEls[n.id].classList.remove("dimmed"));
        diagram.edges.forEach((e, i) => state.edgeEls[i].g.classList.remove("dimmed"));
      }

      function openPanel(node) {
        const c = TYPE[node.type] || TYPE.worker;
        const badge = document.getElementById("panel-type-badge");
        badge.textContent = TYPE_LABELS[node.type] || node.type;
        badge.style.background = c.fill; badge.style.color = c.stroke;
        document.getElementById("panel-title").textContent = node.label.replace(/\n/g, " ");
        document.getElementById("panel-desc").textContent = node.description || "";
        document.getElementById("panel-tech").innerHTML = (node.tech || []).map((t) => `<span class="panel-tag">${t}</span>`).join("");
        document.getElementById("panel-resp").innerHTML = (node.responsibilities || []).map((r) => `<div class="panel-resp-item">${r}</div>`).join("");
        document.getElementById("side-panel").classList.add("open");
        document.getElementById("panel-backdrop").classList.add("open");
      }
      function closePanel() {
        document.getElementById("side-panel").classList.remove("open");
        document.getElementById("panel-backdrop").classList.remove("open");
      }

      // Theme persistence — the chosen color schema survives reloads via
      // localStorage (falls back to in-memory if storage is unavailable, e.g.
      // file:// in some browsers). applyTheme() is the single source of truth.
      const THEME_KEY = "interactive-diagram-theme";
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        document.getElementById("btn-theme").textContent = theme === "dark" ? "◑ Light" : "◐ Dark";
        try { localStorage.setItem(THEME_KEY, theme); } catch (_) {}
      }
      function loadTheme() {
        let saved = null;
        try { saved = localStorage.getItem(THEME_KEY); } catch (_) {}
        if (saved !== "dark" && saved !== "light") {
          // first visit: honor the OS preference, then remember it
          saved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        applyTheme(saved);
      }
      function toggleTheme() {
        applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
      }

      // =====================================================================
      // === EXPORT ==========================================================
      // =====================================================================
      function serializedSVG() {
        const clone = state.svg.cloneNode(true);
        clone.setAttribute("xmlns", SVG_NS);
        // inline the resolved CSS variables so the export is portable
        const cs = getComputedStyle(document.documentElement);
        let xml = new XMLSerializer().serializeToString(clone);
        xml = xml.replace(/var\((--[\w-]+)\)/g, (_, v) => cs.getPropertyValue(v).trim() || "#000");
        return `<?xml version="1.0"?>\n${xml}`;
      }
      function download(blob, name) {
        const url = URL.createObjectURL(blob), a = document.createElement("a");
        a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url);
      }
      function exportSVG() { download(new Blob([serializedSVG()], { type: "image/svg+xml" }), "diagram.svg"); }
      function exportPNG() {
        const xml = serializedSVG();
        const img = new Image();
        img.onload = () => {
          const scale = 2, c = document.createElement("canvas");
          c.width = state.vb.w * scale; c.height = state.vb.h * scale;
          const ctx = c.getContext("2d");
          ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim() || "#fff";
          ctx.fillRect(0, 0, c.width, c.height);
          ctx.drawImage(img, 0, 0, c.width, c.height);
          c.toBlob((b) => download(b, "diagram.png"));
        };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));
      }

      function renderLegend() {
        const used = [...new Set(diagram.nodes.map((n) => n.type))];
        document.getElementById("legend-items").innerHTML = used.map((t) =>
          `<div class="legend-item"><div class="legend-dot" style="background:${TYPE[t].stroke}"></div>${TYPE_LABELS[t] || t}</div>`
        ).join("");
      }

      // =====================================================================
      // === INIT ============================================================
      // =====================================================================
      function init() {
        state.svg = document.getElementById("svg-root");
        loadTheme();                          // restore the persisted color schema
        Layout.clear();

        // 1) resolve geometry on the DATA before drawing
        Layout.run();                         // node push-apart + grow sectors

        // 2) draw — sectors (back) → edges → nodes (front)
        mkDefs(state.svg);
        const bgG = svgEl("g"), edgeG = svgEl("g"), nodeG = svgEl("g");
        state.svg.appendChild(bgG); state.svg.appendChild(edgeG); state.svg.appendChild(nodeG);
        diagram.sectors.forEach((s) => bgG.appendChild(renderSector(s)));
        diagram.edges.forEach((e, i) => edgeG.appendChild(renderEdge(e, i)));
        diagram.nodes.forEach((n) => nodeG.appendChild(renderNode(n)));

        // 3) de-overlap edge labels on the DOM, then audit the whole layout
        Layout.resolveLabels();
        Layout.audit();                       // logs ✓ / ✗ table to the console

        // 4) frame everything
        fit();
        renderLegend();
        wireInteractions();
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
