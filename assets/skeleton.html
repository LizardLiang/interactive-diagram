<!doctype html>
<html lang="zh-TW" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Diagram — Skeleton</title>
    <!--
      ============================================================================
      INTERACTIVE-DIAGRAM SKELETON  (tab / container / block framework)
      ----------------------------------------------------------------------------
      A self-contained starting point for the Interactive-diagram skill. Pure
      HTML + CSS + vanilla JS. No frameworks, no CDN, no build step.

      Fill in only the CONFIG block; the rest of the machinery is generic.

      The AI writes a THREE-LEVEL STRUCTURE; the runtime turns it into HTML/SVG —
      you never hand-write elements:

          TAB        — a whole diagram / view. Each tab is a DOM tab in the
                       floating bar and owns its own <svg> + layout-guard instance.
          CONTAINER  — a ZONE: a rectangle grouping the blocks of one layer /
                       system / module (band / lane / box). OPTIONAL — a tab may
                       omit containers entirely, or mix zoned and free blocks.
          BLOCK      — a node: one rounded rect (or diamond), inside a zone or free.

      The headline feature lives in the "LAYOUT GUARD" section: makeLayout(tab)
      builds a per-tab guard that audits and resolves overlap across the FOUR
      element categories a diagram is made of —

          1. BLOCK     — node rectangles / diamonds
          2. LABEL     — text that rides on the arrow (edge) lines
          3. TITLE     — container captions
          4. CONTAINER — the zone rectangles grouping blocks

      layout.run() is a two-level resolver: it settles blocks WITHIN each zone,
      then packs whole zones (and free blocks) as rigid units from the top-left
      corner, so zones never overlap each other and no block sits on a foreign
      zone. layout.audit() proves no conflict remains and logs a table of any it
      could not fix. Containment (a block living INSIDE its own zone, a title
      captioning its own zone, a band crossing a lane in a grid) is by design
      and is NOT reported as a collision — see POLICY.isConflict.
      ============================================================================
    -->
    <style>
      /* === THEME ============================================================ */
      :root {
        --bg: #f8fafc;
        --surface: #ffffff;
        --fg: #0f172a;
        --fg-muted: #64748b;
        --edge: #94a3b8;
        --border: #e2e8f0;
        --shadow: rgba(0, 0, 0, 0.08);
        --panel-bg: #ffffff;
        --overlay: rgba(0, 0, 0, 0.3);
        --legend-bg: rgba(255, 255, 255, 0.9);

        --c-client: #3b82f6;
        --c-http: #1e3a8a;
        --c-worker: #15803d;
        --c-infra: #374151;
        --c-db: #1f2937;
        --c-external: #dc2626;
        --c-queue: #7c3aed;

        --c-client-fill: #dbeafe;
        --c-http-fill: #e0e7ff;
        --c-worker-fill: #dcfce7;
        --c-infra-fill: #f1f5f9;
        --c-db-fill: #e5e7eb;
        --c-external-fill: #fee2e2;
        --c-queue-fill: #ede9fe;

        /* sequence message stroke palette */
        --seq-slate: #475569;
        --seq-accent: #6366f1;
        --seq-gray: #94a3b8;
      }
      /* Dark theme — Tokyo Night palette (tokyo-night/tokyo-night-vscode-theme) */
      [data-theme="dark"] {
        --bg: #1a1b26;
        --surface: #24283b;
        --fg: #c0caf5;
        --fg-muted: #828bb8;
        --edge: #565f89;
        --border: #3b4261;
        --shadow: rgba(0, 0, 0, 0.5);
        --panel-bg: #24283b;
        --overlay: rgba(0, 0, 0, 0.6);
        --legend-bg: rgba(26, 27, 38, 0.96);

        --c-client: #7aa2f7;   /* blue   */
        --c-http: #2ac3de;     /* cyan   */
        --c-worker: #9ece6a;   /* green  */
        --c-infra: #9aa5ce;    /* gray   */
        --c-db: #e0af68;       /* yellow */
        --c-external: #f7768e; /* red    */
        --c-queue: #bb9af7;    /* purple */

        --c-client-fill: #2b3f63;
        --c-http-fill: #1f4d5d;
        --c-worker-fill: #2f4a2b;
        --c-infra-fill: #2d3350;
        --c-db-fill: #4a3a1f;
        --c-external-fill: #4d2935;
        --c-queue-fill: #382e58;

        --seq-slate: #9aa5ce;
        --seq-accent: #7dcfff;
        --seq-gray: #565f89;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: var(--bg);
        color: var(--fg);
        height: 100vh;
        overflow: hidden;
        user-select: none;
      }

      /* === TOOLBAR ========================================================== */
      #toolbar {
        position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 6px; align-items: center;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 12px; padding: 8px 12px;
        box-shadow: 0 4px 20px var(--shadow); z-index: 100;
        max-width: calc(100vw - 32px); flex-wrap: wrap;
      }
      #toolbar h1 { font-size: 13px; font-weight: 600; margin-right: 8px; white-space: nowrap; }
      .tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
      .tb-btn {
        background: none; border: 1px solid var(--border); border-radius: 7px;
        padding: 5px 10px; font-size: 12px; color: var(--fg); cursor: pointer;
        transition: background 0.15s; white-space: nowrap;
      }
      .tb-btn:hover { background: var(--border); }

      /* tab strip — only shown when there is more than one tab */
      #tab-strip { display: none; gap: 4px; align-items: center; }
      .tab-btn.tab-active { background: var(--border); font-weight: 600; }

      /* === CANVAS =========================================================== */
      #canvas { width: 100vw; height: 100vh; cursor: grab; overflow: hidden; }
      #canvas:active { cursor: grabbing; }
      #canvas svg { position: absolute; inset: 0; width: 100%; height: 100%; }

      /* === LEGEND =========================================================== */
      #legend {
        position: fixed; bottom: 16px; left: 16px;
        background: var(--legend-bg); border: 1px solid var(--border);
        border-radius: 10px; padding: 12px 14px; font-size: 11px; z-index: 50;
        box-shadow: 0 4px 16px var(--shadow); backdrop-filter: blur(8px);
      }
      #legend h3 {
        font-size: 11px; font-weight: 600; color: var(--fg-muted);
        margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase;
      }
      .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 5px; }
      .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

      /* === SIDE PANEL ======================================================= */
      #panel-backdrop { display: none; position: fixed; inset: 0; background: var(--overlay); z-index: 200; }
      #panel-backdrop.open { display: block; }
      #side-panel {
        position: fixed; top: 0; right: -440px; width: 420px; height: 100vh;
        background: var(--panel-bg); border-left: 1px solid var(--border);
        box-shadow: -8px 0 32px var(--shadow); z-index: 201;
        transition: right 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        overflow-y: auto; padding: 28px 24px;
      }
      #side-panel.open { right: 0; }
      #panel-close {
        position: absolute; top: 16px; right: 16px; background: none;
        border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px;
        cursor: pointer; font-size: 16px; color: var(--fg-muted);
        display: flex; align-items: center; justify-content: center;
      }
      #panel-type-badge {
        display: inline-block; font-size: 11px; font-weight: 600;
        padding: 3px 9px; border-radius: 20px; margin-bottom: 10px;
      }
      #panel-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
      #panel-desc { font-size: 14px; color: var(--fg-muted); line-height: 1.7; margin-bottom: 18px; white-space: pre-wrap; }
      .panel-section { margin-bottom: 16px; }
      .panel-section h4 {
        font-size: 11px; font-weight: 600; color: var(--fg-muted);
        text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
      }
      .panel-tag { display: inline-block; background: var(--border); border-radius: 6px; padding: 3px 9px; font-size: 12px; margin: 2px; }
      .panel-resp-item { font-size: 13px; line-height: 1.6; padding: 5px 0; border-bottom: 1px solid var(--border); }
      .panel-resp-item:last-child { border-bottom: none; }

      .node-group, .edge-group, .msg-group { transition: opacity 0.18s; }
      .dimmed { opacity: 0.12; }

      /* === HELP MODAL ======================================================= */
      #help-modal { display: none; position: fixed; inset: 0; z-index: 300; align-items: center; justify-content: center; }
      #help-modal.open { display: flex; }
      #help-backdrop { position: absolute; inset: 0; background: var(--overlay); }
      #help-card {
        position: relative; background: var(--panel-bg); border: 1px solid var(--border);
        border-radius: 14px; padding: 26px 28px; width: 460px; max-width: calc(100vw - 32px);
        max-height: calc(100vh - 64px); overflow-y: auto; box-shadow: 0 16px 56px var(--shadow);
      }
      #help-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
      #help-card p.sub { font-size: 12px; color: var(--fg-muted); margin-bottom: 16px; }
      #help-card dl { display: grid; grid-template-columns: auto 1fr; gap: 10px 16px; font-size: 13px; align-items: baseline; }
      #help-card dt { font-weight: 600; white-space: nowrap; }
      #help-card dd { color: var(--fg-muted); line-height: 1.5; }
      #help-card strong { color: var(--fg); font-weight: 600; }
      #help-close {
        position: absolute; top: 14px; right: 14px; background: none; border: 1px solid var(--border);
        border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 15px; color: var(--fg-muted);
        display: flex; align-items: center; justify-content: center;
      }
    </style>
  </head>

  <body>
    <div id="toolbar">
      <h1 id="app-title">圖表</h1>
      <div class="tb-sep"></div>
      <div id="tab-strip"></div>
      <div class="tb-sep" id="tab-sep" style="display:none"></div>
      <button class="tb-btn" id="btn-zoom-in">＋ 放大</button>
      <button class="tb-btn" id="btn-zoom-out">－ 縮小</button>
      <button class="tb-btn" id="btn-fit">⊡ 適應畫面</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-theme">◐ 深色</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-help">？ 說明</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-audit">⚑ 檢查重疊</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-svg">↓ SVG</button>
      <button class="tb-btn" id="btn-png">↓ PNG</button>
    </div>

    <div id="canvas"></div>

    <div id="legend"><h3 id="legend-title">節點類型</h3><div id="legend-items"></div></div>

    <div id="panel-backdrop"></div>
    <div id="side-panel">
      <button id="panel-close">✕</button>
      <div id="panel-type-badge"></div>
      <div id="panel-title"></div>
      <div id="panel-desc"></div>
      <div id="panel-tech-section" class="panel-section"><h4>技術</h4><div id="panel-tech"></div></div>
      <div id="panel-resp-section" class="panel-section"><h4>職責</h4><div id="panel-resp"></div></div>
    </div>

    <div id="help-modal">
      <div id="help-backdrop"></div>
      <div id="help-card">
        <button id="help-close">✕</button>
        <h2>如何使用這份圖表</h2>
        <p class="sub">所有操作都在你的瀏覽器中執行，不會傳送任何資料。</p>
        <dl>
          <dt>滑過節點</dt><dd>標示該節點及其<strong>整條連接鏈</strong>，其餘節點淡化。</dd>
          <dt>雙擊節點</dt><dd>釘選鏈結標示使其保持顯示；再次雙擊可取消釘選。</dd>
          <dt>單擊節點</dt><dd>開啟詳細資訊面板；點擊其他節點會清除已釘選的標示。</dd>
          <dt>拖曳節點</dt><dd>移動節點位置，連接線會跟著移動。</dd>
          <dt>拖曳畫布</dt><dd>平移整張圖。</dd>
          <dt>滾動 / 縮放</dt><dd>放大或縮小；按「⊡ 適應畫面」可顯示全圖。</dd>
          <dt>分頁</dt><dd>在上方工具列切換不同檢視。</dd>
          <dt>◐ / ◑</dt><dd>切換淺色 / 深色主題。</dd>
          <dt>⚑ 檢查重疊</dt><dd>檢查節點是否重疊；發現時可一鍵自動修正版面。</dd>
          <dt>↓ SVG / PNG</dt><dd>將目前檢視匯出為圖片。</dd>
        </dl>
      </div>
    </div>

    <script>
      const SVG_NS = "http://www.w3.org/2000/svg";

      // =====================================================================
      // === CONFIG ===  Edit ONLY this object to change the whole picture. ==
      // =====================================================================
      // `app.tabs` is a list of independent diagrams. ONE tab → looks exactly
      // like a single-diagram file (the tab strip stays hidden). TWO+ tabs →
      // a tab strip appears in the floating bar to switch between them.
      //
      // Inside a tab:
      //   containers[] — OPTIONAL zone rectangles grouping the blocks of one
      //                  layer / system / module. Zones never overlap each
      //                  other. orient drives how they grow:
      //     "band" = full-width horizontal stripe (height fixed, x/width auto)
      //     "lane" = full-height vertical column   (width fixed, y/height auto)
      //     "box"  = free rectangle that hugs its members on all sides
      //     (a band may cross a lane — that grid crossing is the one allowed
      //      container overlap)
      //   blocks[]     — the nodes. `container` is the id of the zone it
      //                  belongs to; omit it (or omit containers entirely) and
      //                  the block packs as a FREE unit alongside the zones.
      //                  x/y/w/h are STARTING HINTS; layout.run() finalizes
      //                  them from the top-left corner so nothing overlaps.
      //   edges[]      — connections between blocks.
      const app = {
        title: "圖表",
        tabs: [
          {
            id: "system",
            label: "System",
            type: "system",

            containers: [
              { id: "client",  label: "Client tier",  orient: "band", color: "#3b82f6", title: { side: "above" } },
              { id: "backend", label: "Backend tier", orient: "band", color: "#15803d", title: { side: "above" } },
              { id: "data",    label: "Data tier",    orient: "band", color: "#1f2937", title: { side: "above" } },
            ],

            blocks: [
              { id: "browser", container: "client", type: "client", x: 120, y: 120, w: 220, h: 90,
                label: "Browser\n(SPA)",
                description: "The user-facing single-page app. Talks to the API over HTTPS and streams updates over SSE.",
                tech: ["React", "EventSource"],
                responsibilities: ["Render UI", "POST user actions", "Subscribe to SSE stream"] },
              { id: "api", container: "backend", type: "http", x: 120, y: 360, w: 220, h: 90,
                label: "API service",
                description: "Thin HTTP layer. Validates requests, enqueues work, returns 202 immediately.",
                tech: ["ASP.NET Core"],
                responsibilities: ["Auth + validation", "Enqueue work", "Stream SSE back"] },
              { id: "worker", container: "backend", type: "worker", x: 420, y: 360, w: 220, h: 90,
                label: "Worker\n(BackgroundService)",
                description: "Drains the queue and runs the long-lived job, writing results to the store.",
                tech: ["IHostedService"],
                responsibilities: ["Dequeue jobs", "Run async loop", "Persist results"] },
              { id: "db", container: "data", type: "db", x: 420, y: 600, w: 220, h: 90,
                label: "Database",
                description: "Append-only event log + relational tables.",
                tech: ["PostgreSQL"],
                responsibilities: ["Persist state", "Serve reads"] },
            ],

            edges: [
              { from: "browser", to: "api",    label: "POST /action", style: "sync" },
              { from: "api",     to: "browser", label: "202 Accepted", style: "dashed", bendDir: -1 },
              { from: "api",     to: "worker", label: "enqueue",      style: "async" },
              { from: "worker",  to: "db",     label: "write result", style: "sync" },
              { from: "db",      to: "worker", label: "load history", style: "dashed", bendDir: -1 },
            ],
          },

          {
            id: "deploy",
            label: "Deployment",
            type: "system",

            containers: [
              { id: "edge",  label: "Edge",          orient: "band", color: "#3b82f6", title: { side: "above" } },
              { id: "infra", label: "Infrastructure", orient: "band", color: "#374151", title: { side: "above" } },
            ],

            blocks: [
              { id: "cdn", container: "edge", type: "client", x: 160, y: 120, w: 220, h: 90,
                label: "CDN / Edge",
                description: "Terminates TLS and serves static assets close to the user.",
                tech: ["CloudFront"],
                responsibilities: ["Cache static assets", "TLS termination"] },
              { id: "app", container: "infra", type: "worker", x: 160, y: 360, w: 220, h: 90,
                label: "App container",
                description: "Runs the API + worker image behind an internal load balancer.",
                tech: ["ECS Fargate"],
                responsibilities: ["Serve API", "Run background jobs"] },
              { id: "store", container: "infra", type: "db", x: 540, y: 360, w: 220, h: 90,
                label: "Managed store",
                description: "Managed Postgres with automated backups.",
                tech: ["RDS"],
                responsibilities: ["Persist state", "Point-in-time recovery"] },
            ],

            edges: [
              { from: "cdn", to: "app",   label: "origin fetch", style: "sync" },
              { from: "app", to: "store", label: "read / write", style: "sync" },
            ],
          },

          // A SEQUENCE (lifeline) tab. Instead of containers/blocks/edges it
          // carries `actors` (vertical lifelines, left→right in array order) and
          // `messages` (ordered events, top→bottom). A message is a cross arrow
          // when from!==to, or a self-loop when from===to. `style` drives the
          // stroke/marker; `type` on an actor drives its color from TYPE.
          // A message may also carry `activate: true` (opens an activation bar
          // on the receiver, `to`) and/or `deactivate: true` (closes the bar on
          // the sender, `from`). Flags are explicit — no auto-inference.
          // Re-entrant activations on the same actor merge into one continuous
          // bar; an activation left open at the end runs to the bottom actor box.
          {
            id: "seq-demo",
            label: "Sequence",
            type: "sequence",
            actors: [                          // order = left→right; middle actor is the pivot
              { id: "a", label: "Actor A", type: "client" },
              { id: "b", label: "Actor B", type: "worker" },
              { id: "c", label: "Actor C", type: "db" },
            ],
            messages: [
              { from: "a", to: "b", style: "sync",     label: "① Request to B",
                description: "Dummy step 1.", tech: ["dummy"], responsibilities: ["dummy"],
                activate: true },
              { from: "b", to: "b", style: "internal", label: "② B internal work",
                description: "Dummy self-step on B.", tech: ["dummy"], responsibilities: ["dummy"] },
              { from: "b", to: "b", style: "internal", label: "③ B second internal step",
                description: "Dummy self-step.", tech: ["dummy"], responsibilities: ["dummy"] },
              { from: "b", to: "a", style: "stream",   label: "④ Result back to A",
                description: "Dummy result to A.", tech: ["dummy"], responsibilities: ["dummy"],
                deactivate: true },
              { from: "a", to: "a", style: "internal", label: "⑤ A reviews internally",
                description: "Dummy self-step on A.", tech: ["dummy"], responsibilities: ["dummy"] },
              { from: "a", to: "b", style: "sync",     label: "⑥ A confirms to B",
                description: "Dummy confirm.", tech: ["dummy"], responsibilities: ["dummy"] },
              { from: "a", to: "c", style: "sync",     label: "⑦ A acts on C directly",
                description: "Dummy direct action on C — skips B.", tech: ["dummy"], responsibilities: ["dummy"] },
            ],
          },
        ],
      };

      // Color lookup by block type — the persistent color schema. Each entry
      // maps to a CSS custom property pair so dark mode is a one-attribute flip.
      const TYPE = {
        client:   { stroke: "var(--c-client)",   fill: "var(--c-client-fill)" },
        http:     { stroke: "var(--c-http)",     fill: "var(--c-http-fill)" },
        worker:   { stroke: "var(--c-worker)",   fill: "var(--c-worker-fill)" },
        infra:    { stroke: "var(--c-infra)",    fill: "var(--c-infra-fill)" },
        queue:    { stroke: "var(--c-queue)",    fill: "var(--c-queue-fill)" },
        db:       { stroke: "var(--c-db)",       fill: "var(--c-db-fill)" },
        external: { stroke: "var(--c-external)", fill: "var(--c-external-fill)" },
      };
      const TYPE_LABELS = {
        client: "用戶端", http: "HTTP / 控制器", worker: "工作程序 / 服務",
        infra: "基礎設施", queue: "通道 / 佇列", db: "資料庫", external: "外部 API",
      };

      // Sequence message styles → stroke color + dash pattern. The arrowhead is
      // colored via marker fill="context-stroke", so one marker matches every
      // style. `internal` is the self-loop style (from === to).
      //   sync = solid slate · stream = solid accent · return = dashed gray
      const MSG_STYLE = {
        sync:     { stroke: "var(--seq-slate)",  dash: null },
        stream:   { stroke: "var(--seq-accent)", dash: null },
        return:   { stroke: "var(--seq-gray)",   dash: "7 5" },
        internal: { stroke: "var(--seq-slate)",  dash: null },
      };
      const MSG_STYLE_LABELS = {
        sync: "同步 sync", stream: "串流 stream", return: "回傳 return", internal: "內部 internal",
      };

      // =====================================================================
      // === LAYOUT GUARD ====================================================
      // makeLayout(tab) builds a per-tab guard: distance / overlap checking
      // across the four element categories. Pure geometry — no rendering
      // knowledge beyond the accessor functions registered during RENDER.
      //
      //   layout.run()   — resolve collisions (call BEFORE applying the viewBox)
      //   layout.audit() — return + log a report of any overlaps that remain
      //
      // Element kinds: 'block' | 'label' | 'title' | 'container'.
      // =====================================================================
      function makeLayout(tab) {
        // --- geometry primitives -----------------------------------------
        // AABB = { x, y, w, h }. left/right/top/bottom helpers below.
        const L = (r) => r.x, R = (r) => r.x + r.w, T = (r) => r.y, B = (r) => r.y + r.h;
        const cx = (r) => r.x + r.w / 2, cy = (r) => r.y + r.h / 2;

        // CJK-aware text measurement. ASCII ≈ 0.55em, fullwidth/CJK ≈ 0.95em.
        function measureText(str, fontSize = 13) {
          let max = 0;
          for (const line of String(str).split("\n")) {
            let w = 0;
            for (const ch of line) w += (ch.codePointAt(0) > 0x2000 ? 0.95 : 0.55) * fontSize;
            if (w > max) max = w;
          }
          return max;
        }
        function textBox(str, fontSize = 13, lineH = 16) {
          const lines = String(str).split("\n").length;
          return { w: measureText(str, fontSize), h: lines * lineH };
        }

        // Penetration depth of two boxes inflated by `gap`. Positive on both
        // axes ⇒ they overlap (or sit closer than `gap`).
        function penetration(a, b, gap = 0) {
          const ox = (a.w + b.w) / 2 + gap - Math.abs(cx(a) - cx(b));
          const oy = (a.h + b.h) / 2 + gap - Math.abs(cy(a) - cy(b));
          return { ox, oy };
        }
        function overlaps(a, b, gap = 0) {
          const p = penetration(a, b, gap);
          return p.ox > 0 && p.oy > 0;
        }
        // Is box `inner` fully contained within `outer` (with `pad` slack)?
        function contains(outer, inner, pad = 0) {
          return L(inner) >= L(outer) + pad && R(inner) <= R(outer) - pad &&
                 T(inner) >= T(outer) + pad && B(inner) <= B(outer) - pad;
        }

        // --- minimum clearance (px) between each category pair ------------
        const GAP = {
          block: 40,     // SKILL.md hard rule: ≥40px between blocks
          label: 4,      // edge labels vs each other
          title: 8,
          container: 48, // zone-to-zone clearance (band×lane crossing exempt)
          mixed: 8,      // any cross-category pair not listed
        };
        // Conflict POLICY: which pairs MUST NOT overlap. Identity-aware —
        // `a` / `b` are registry entries ({ kind, id }). A container is a
        // ZONE grouping blocks of one layer / system / module, so:
        //   container×container — CONFLICT; only band×lane grid crossing is
        //                         exempt (both spanning orients must cross)
        //   container×block     — CONFLICT unless the block is a MEMBER of
        //                         that container, or its own container forms
        //                         a crossing band×lane pair with it (a grid
        //                         cell IS the crossing region)
        //   container×title     — CONFLICT unless the title captions THAT
        //                         container, or the two containers cross
        //   container×label     — allowed (labels float over zone backgrounds)
        const containerOf = (id) => (tab.containers || []).find((s) => s.id === id);
        const crossingZones = (sa, sb) => !!(sa && sb &&
          ((sa.orient === "band" && sb.orient === "lane") ||
           (sa.orient === "lane" && sb.orient === "band")));
        function isConflict(a, b) {
          const c = a.kind === "container" ? a : b.kind === "container" ? b : null;
          if (!c) return true; // block/label/title pairs all must stay clear
          const o = c === a ? b : a;
          const zone = containerOf(c.id);
          if (o.kind === "label") return false;
          if (o.kind === "container") return !crossingZones(zone, containerOf(o.id));
          if (o.kind === "block") {
            const blk = (tab.blocks || []).find((n) => n.id === o.id);
            if (!blk) return true;
            if (blk.container === c.id) return false;                       // its own zone
            return !crossingZones(zone, containerOf(blk.container));        // grid crossing
          }
          /* title */ return o.id !== c.id && !crossingZones(zone, containerOf(o.id));
        }
        function gapFor(ka, kb) {
          if (ka === kb && GAP[ka] != null) return GAP[ka];
          return GAP.mixed;
        }

        // --- registry: RENDER pushes live accessors here ------------------
        // Each entry: { kind, id, get() -> box, set(box) }. get/set read and
        // write the *current* geometry so audit reflects post-drag state too.
        const reg = { block: [], label: [], title: [], container: [] };
        function register(kind, id, get, set) { reg[kind].push({ kind, id, get, set }); }
        function clear() { for (const k in reg) reg[k] = []; }
        function all() { return [...reg.block, ...reg.label, ...reg.title, ...reg.container]; }

        // --- BFS pin-settled block resolver (replaces the old all-pairs
        // relaxation loop, which moved BOTH boxes on every conflicting pair
        // and could exit mid-conflict when maxIter was hit). Anchor = the
        // top-left block; it and every later "settled" block are pinned and
        // NEVER move again. Each remaining block is visited in a spatial
        // nearest-neighbor wavefront and pushed — itself only — the minimum
        // distance needed to clear every already-settled block. Because
        // settled boxes are fixed obstacles, once a block settles it has
        // ZERO overlap with everything placed before it; processing every
        // block this way yields a globally overlap-free layout. -----------
        // O(n^3): the while loop runs n-1 times, each pick scans every
        // remaining block against every already-ordered block. Deliberate,
        // not an oversight — diagrams run to tens of blocks, where this is
        // negligible; a k-d tree / grid index would only pay off at a scale
        // this skeleton isn't meant for.
        function bfsOrderFromTopLeft(ns) {
          if (!ns.length) return [];
          // stable tie-break: pre-sort by (cy, cx) so ties in nearest-
          // neighbor distance resolve to the earlier reading-order item.
          const remaining = ns.slice().sort((a, b) => (cy(a) - cy(b)) || (cx(a) - cx(b)));
          const order = [remaining.shift()]; // anchor = min(cy, cx), pinned first
          while (remaining.length) {
            let bestIdx = 0, bestD = Infinity;
            for (let i = 0; i < remaining.length; i++) {
              const r = remaining[i];
              for (const o of order) {
                const d = (cx(r) - cx(o)) ** 2 + (cy(r) - cy(o)) ** 2;
                if (d < bestD) { bestD = d; bestIdx = i; }
              }
            }
            order.push(remaining.splice(bestIdx, 1)[0]);
          }
          return order;
        }
        // Move `cur` only (mutates cur.x / cur.y) until clear of every box in
        // `settled` (plain {x,y,w,h} snapshots — they never move). Escapes
        // along the axis of least penetration against the deepest offender,
        // one offender at a time. A bounded iteration cap + far-corner park
        // fallback guarantees both termination and a conflict-free result.
        function pushClear(cur, settled, gap) {
          const MAX = 200;
          if (!settled.length) return true;
          for (let iter = 0; iter < MAX; iter++) {
            let worst = null, worstDepth = 0, worstP = null;
            for (const box of settled) {
              const p = penetration(cur, box, gap);
              if (p.ox > 0 && p.oy > 0) {
                const depth = p.ox * p.oy; // deepest penetration = largest overlap area
                if (depth > worstDepth) { worstDepth = depth; worst = box; worstP = p; }
              }
            }
            if (!worst) return true; // clear of every settled item
            if (worstP.ox < worstP.oy) {           // escape along axis of least penetration
              const dir = cx(cur) >= cx(worst) ? 1 : -1;
              cur.x += dir * (worstP.ox + 0.5);
            } else {
              const dir = cy(cur) >= cy(worst) ? 1 : -1;
              cur.y += dir * (worstP.oy + 0.5);
            }
          }
          // cap hit (pathological/dense cluster) — park just beyond the
          // settled bounding-box bottom-right corner: always clear, always
          // terminates. Container refit + viewBox framing still picks it up.
          const maxR = Math.max(...settled.map(R)), maxB = Math.max(...settled.map(B));
          cur.x = maxR + gap + 10;
          cur.y = maxB + gap + 10;
          return false;
        }
        function resolveBlocks(ns) {
          if (ns.length < 2) return;
          const order = bfsOrderFromTopLeft(ns);
          const settled = [{ x: order[0].x, y: order[0].y, w: order[0].w, h: order[0].h }]; // anchor pinned
          for (let i = 1; i < order.length; i++) {
            const cur = order[i];
            pushClear(cur, settled, GAP.block);
            settled.push({ x: cur.x, y: cur.y, w: cur.w, h: cur.h });
          }
        }
        // kept for custom layouts/tests: flat settle over EVERY block. run()
        // no longer uses this — it settles per zone, then packs zones.
        function resolveBlocksBFS() { resolveBlocks(tab.blocks || []); }

        // --- ZONE UNITS: two-level layout ----------------------------------
        // A container is a ZONE grouping blocks of the same layer / system /
        // module. Level 1: settle blocks WITHIN each zone (resolveBlocks,
        // hints preserved). Level 2: pack whole zones — plus every free
        // (containerless) block — as RIGID UNITS with the same pin-settled
        // guarantee, so zones never overlap each other and no block sits on
        // a foreign zone. Finally the whole layout is translated so its
        // bounding box starts at the top-left origin (MARGIN, MARGIN).
        const MARGIN = 60;   // top-left origin of the packed layout
        const BIG = 1e6;     // "spans the full axis" stand-in for band/lane packing

        // the zone a block actually belongs to (unknown ids → free block)
        function zoneOf(block) {
          return block.container
            ? (tab.containers || []).find((s) => s.id === block.container) || null
            : null;
        }
        // one unit per zone (with its member blocks) + one per free block.
        // Declared-but-empty zones still pack (they keep their hint box).
        function groupUnits() {
          const units = [];
          (tab.containers || []).forEach((zone) =>
            units.push({ zone, members: (tab.blocks || []).filter((b) => zoneOf(b) === zone) }));
          (tab.blocks || []).forEach((b) => {
            if (!zoneOf(b)) units.push({ zone: null, members: [b] });
          });
          return units;
        }
        // rigid bounding box of a unit: members + container pad + the caption
        // strip, so a zone's title can never collide with a neighboring zone.
        function unitBox(unit, pad = 28) {
          const ms = unit.members;
          let box = null;
          if (ms.length) {
            const x0 = Math.min(...ms.map(L)), x1 = Math.max(...ms.map(R));
            const y0 = Math.min(...ms.map(T)), y1 = Math.max(...ms.map(B));
            box = unit.zone
              ? { x: x0 - pad, y: y0 - pad, w: x1 - x0 + pad * 2, h: y1 - y0 + pad * 2 }
              : { x: x0, y: y0, w: x1 - x0, h: y1 - y0 };
          } else if (unit.zone) {
            const z = unit.zone;
            box = { x: z.x || 0, y: z.y || 0, w: z.w || 160, h: z.h || 100 };
          }
          if (box && unit.zone) {
            box.y -= 28; box.h += 28; // "above" caption strip (placeTitles' first pick)
            if (unit.zone.title && unit.zone.title.side === "left") {
              const tw = measureText(unit.zone.label, 11) + 30;
              box.x -= tw; box.w += tw;
            }
          }
          return box;
        }
        // translate a unit rigidly: every member block + the box (and, for an
        // empty zone, its hint rectangle) move by the same delta.
        function moveUnit(unit, dx, dy) {
          unit.members.forEach((b) => { b.x += dx; b.y += dy; });
          if (unit.zone && !unit.members.length) {
            unit.zone.x = (unit.zone.x || 0) + dx;
            unit.zone.y = (unit.zone.y || 0) + dy;
          }
          unit.box.x += dx; unit.box.y += dy;
        }
        // band units later span the full content width (lanes: full height),
        // so for packing they are treated as unbounded on that axis — except
        // against a crossing band×lane pair, which policy allows to overlap.
        const orientOf = (u) => (u.zone && u.zone.orient) || null;
        function crossPair(a, b) {
          const oa = orientOf(a), ob = orientOf(b);
          return (oa === "band" && ob === "lane") || (oa === "lane" && ob === "band");
        }
        function packBox(u, versus) {
          const b = { x: u.box.x, y: u.box.y, w: u.box.w, h: u.box.h };
          if (orientOf(u) === "band" && orientOf(versus) !== "lane") {
            const c = b.x + b.w / 2; b.x = c - BIG / 2; b.w = BIG;
          }
          if (orientOf(u) === "lane" && orientOf(versus) !== "band") {
            const c = b.y + b.h / 2; b.y = c - BIG / 2; b.h = BIG;
          }
          return b;
        }
        // pushClear at the unit level: move `cur` (rigidly) until clear of
        // every settled unit. The inflated packBox makes the escape axis fall
        // out of axis-of-least-penetration automatically — a band conflict is
        // "infinitely" deep in x, so the escape is always vertical (bands
        // stack); a lane conflict escapes horizontally (lanes sit side by
        // side); box/free pairs behave exactly like the block resolver.
        function pushUnitClear(cur, settledUnits, gap) {
          const MAX = 200;
          for (let iter = 0; iter < MAX; iter++) {
            let worst = null, worstDepth = 0, worstP = null, worstA = null;
            for (const s of settledUnits) {
              if (crossPair(cur, s)) continue; // band×lane grid crossing allowed
              const a = packBox(cur, s), b = packBox(s, cur);
              const p = penetration(a, b, gap);
              if (p.ox > 0 && p.oy > 0) {
                const depth = Math.min(p.ox, p.oy); // area is meaningless on inflated boxes
                if (depth > worstDepth) { worstDepth = depth; worst = b; worstP = p; worstA = a; }
              }
            }
            if (!worst) return true;
            if (worstP.ox < worstP.oy) {
              const dir = cx(worstA) >= cx(worst) ? 1 : -1;
              moveUnit(cur, dir * (worstP.ox + 0.5), 0);
            } else {
              const dir = cy(worstA) >= cy(worst) ? 1 : -1;
              moveUnit(cur, 0, dir * (worstP.oy + 0.5));
            }
          }
          // cap hit — park below everything settled (always clear, terminates)
          const maxB = Math.max(...settledUnits.map((s) => B(s.box)));
          moveUnit(cur, 0, (maxB + gap + 10) - cur.box.y);
          return false;
        }
        // pin-settled packing over units in top-left reading order — the same
        // guarantee the block resolver gives, lifted one level.
        function packUnits(units) {
          const live = units.filter((u) => u.box);
          if (live.length < 2) return;
          const remaining = live.slice().sort((a, b) => (cy(a.box) - cy(b.box)) || (cx(a.box) - cx(b.box)));
          const order = [remaining.shift()]; // anchor unit = top-left, pinned
          while (remaining.length) {
            let bestIdx = 0, bestD = Infinity;
            for (let i = 0; i < remaining.length; i++) {
              for (const o of order) {
                const d = (cx(remaining[i].box) - cx(o.box)) ** 2 + (cy(remaining[i].box) - cy(o.box)) ** 2;
                if (d < bestD) { bestD = d; bestIdx = i; }
              }
            }
            order.push(remaining.splice(bestIdx, 1)[0]);
          }
          const settled = [order[0]];
          for (let i = 1; i < order.length; i++) {
            pushUnitClear(order[i], settled, GAP.container);
            settled.push(order[i]);
          }
        }
        // translate the whole layout so its bounding box starts at the
        // top-left origin (MARGIN, MARGIN) — the deterministic "start from
        // the top-left corner" contract.
        function normalizeOrigin(units) {
          const boxes = units.filter((u) => u.box).map((u) => u.box);
          if (!boxes.length) return;
          const dx = MARGIN - Math.min(...boxes.map(L));
          const dy = MARGIN - Math.min(...boxes.map(T));
          if (!dx && !dy) return;
          units.forEach((u) => { if (u.box) moveUnit(u, dx, dy); });
        }

        // --- grow containers to contain their member blocks ---------------
        // band → fixed height, spans full diagram width, y/h hug member rows
        // lane → fixed width,  spans full diagram height, x/w hug member cols
        // box  → hugs members on all four sides
        function fitContainers(pad = 28) {
          (tab.containers || []).forEach((s) => {
            const members = tab.blocks.filter((n) => n.container === s.id);
            if (!members.length) return;
            const minX = Math.min(...members.map(L)), maxX = Math.max(...members.map(R));
            const minY = Math.min(...members.map(T)), maxY = Math.max(...members.map(B));
            if (s.orient === "band") {
              s.y = minY - pad; s.h = (maxY - minY) + pad * 2;
            } else if (s.orient === "lane") {
              s.x = minX - pad; s.w = (maxX - minX) + pad * 2;
            } else {
              s.x = minX - pad; s.y = minY - pad;
              s.w = (maxX - minX) + pad * 2; s.h = (maxY - minY) + pad * 2;
            }
          });
          // bands span the union width of all blocks; lanes span union height.
          const ns = tab.blocks || [];
          if (!ns.length) return; // no blocks → no spans to compute
          const gx0 = Math.min(...ns.map(L)) - 60, gx1 = Math.max(...ns.map(R)) + 60;
          const gy0 = Math.min(...ns.map(T)) - 60, gy1 = Math.max(...ns.map(B)) + 60;
          tab.containers.forEach((s) => {
            if (s.orient === "band") { s.x = gx0; s.w = gx1 - gx0; }
            if (s.orient === "lane") { s.y = gy0; s.h = gy1 - gy0; }
          });
        }

        // --- place a container title in clear space outside the band/box --
        // Returns the title box; RENDER draws it and registers it.
        function titleBox(s, fontSize = 11) {
          const w = measureText(s.label, fontSize) + 24, h = 22;
          const side = (s.title && s.title.side) || "above";
          if (side === "above") return { x: cx(s) - w / 2, y: T(s) - h - 6, w, h };
          if (side === "left")  return { x: L(s) - w - 6,   y: cy(s) - h / 2, w, h };
          /* top (inside, top-left) */ return { x: L(s) + 8, y: T(s) + 6, w, h };
        }

        // --- titles as first-class obstacles -------------------------------
        // Runs after fitContainers() (container geometry final). Containers
        // are visited top-left first (same philosophy as the block BFS); for
        // each, pick whichever side (above|left|top) has the LEAST overlap
        // against every settled block plus every title already placed this
        // pass. A title that still conflicts after the best-side pick feeds
        // the outer convergence loop, which nudges the offending block.
        function placeTitles() {
          if (!(tab.containers || []).length) return;
          const sides = ["above", "left", "top"];
          const blockBoxes = (tab.blocks || []).map((b) => ({ x: b.x, y: b.y, w: b.w, h: b.h }));
          const ordered = tab.containers.slice().sort((a, b) => (cy(a) - cy(b)) || (cx(a) - cx(b)));
          const placed = [];
          ordered.forEach((s) => {
            // try the author's declared side first so it wins whenever clear
            const declared = (s.title && s.title.side) || "above";
            const trySides = [declared, ...sides.filter((x) => x !== declared)];
            let bestSide = declared, bestScore = Infinity;
            for (const side of trySides) {
              const tb = titleBox({ ...s, title: { side } });
              let score = 0;
              for (const b of blockBoxes) {
                const p = penetration(tb, b, GAP.mixed);
                if (p.ox > 0 && p.oy > 0) score += p.ox * p.oy;
              }
              for (const t of placed) {
                const p = penetration(tb, t, GAP.title);
                if (p.ox > 0 && p.oy > 0) score += p.ox * p.oy;
              }
              if (score < bestScore) { bestScore = score; bestSide = side; }
              if (bestScore === 0) break;
            }
            s.title = s.title || {};
            s.title.side = bestSide;
            placed.push(titleBox(s));
          });
        }

        // --- edge-label placement (runs on DOM after render) --------------
        // Delegates to placeLabels() in the render layer, which slides each
        // label ALONG its own curve to the clearest spot (away from blocks,
        // titles and sibling labels) instead of detaching it vertically.
        function resolveLabels() { placeLabels(tab); }

        // --- the auditor --------------------------------------------------
        // Walks every conflicting category pair and reports overlaps. Also
        // reports blocks that have spilled outside their declared container.
        function audit({ log = true } = {}) {
          const conflicts = [];
          const items = all().map((e) => ({ ...e, box: e.get() })).filter((x) => x.box);

          for (let i = 0; i < items.length; i++) {
            for (let j = i + 1; j < items.length; j++) {
              const a = items[i], b = items[j];
              if (!isConflict(a, b)) continue;
              const g = gapFor(a.kind, b.kind);
              const p = penetration(a.box, b.box, g);
              if (p.ox > 0 && p.oy > 0) {
                const type =
                  a.kind === "container" && b.kind === "container" ? "zone-overlap" :
                  (a.kind === "container" || b.kind === "container") &&
                  (a.kind === "block" || b.kind === "block") ? "foreign-block" : "overlap";
                conflicts.push({
                  type,
                  a: `${a.kind}:${a.id}`, b: `${b.kind}:${b.id}`,
                  gap: g, overlapX: +p.ox.toFixed(1), overlapY: +p.oy.toFixed(1),
                });
              }
            }
          }
          // spill check: every block must sit fully inside its container.
          reg.block.forEach((n) => {
            const block = tab.blocks.find((d) => d.id === n.id);
            if (!block || !block.container) return;
            const sec = reg.container.find((s) => s.id === block.container);
            if (sec && !contains(sec.get(), n.get(), 0)) {
              conflicts.push({ type: "spill", a: `block:${n.id}`, b: `container:${block.container}`, gap: 0, overlapX: "-", overlapY: "-" });
            }
          });

          const report = { ok: conflicts.length === 0, count: conflicts.length, conflicts };
          if (log) {
            const tag = `[${tab.id}]`;
            if (report.ok) console.log(`%c✓ Layout audit ${tag}: no overlaps`, "color:#15803d;font-weight:600");
            else {
              console.warn(`✗ Layout audit ${tag}: ${report.count} conflict(s)`);
              if (console.table) console.table(conflicts);
              else conflicts.forEach((c) => console.warn(c));
            }
          }
          return report;
        }

        // --- outer-loop repair: push the BLOCK side of a residual conflict -
        // Called by the render layer between audit() passes (see drawTab's
        // convergence loop). Labels/titles that couldn't clear by sliding
        // (decision: "labels are first-class obstacles") get to push a block
        // instead. For each residual overlap conflict touching a block, pin
        // everything else and move that block the minimum distance to clear
        // the other side (its registered current box — DOM-accurate, since
        // this runs after render). Conflicts between two non-block items
        // (label×label, title×title) are left to placeLabels/placeTitles,
        // which already resolve those categories to guaranteed-clear.
        function nudgeBlocksForConflicts(report) {
          const idParts = (s) => { const i = s.indexOf(":"); return [s.slice(0, i), s.slice(i + 1)]; };
          const findBox = (kind, id) => {
            const e = reg[kind] && reg[kind].find((x) => x.id === id);
            return e ? e.get() : null;
          };
          let nudgedAny = false;
          for (const c of report.conflicts) {
            // foreign-block (a block on a zone it doesn't belong to) is also
            // fixable by pushing the block; spill/zone-overlap are not.
            if (c.type !== "overlap" && c.type !== "foreign-block") continue;
            const [ka, ida] = idParts(c.a), [kb, idb] = idParts(c.b);
            let blockId, otherKind, otherId;
            if (ka === "block") { blockId = ida; otherKind = kb; otherId = idb; }
            else if (kb === "block") { blockId = idb; otherKind = ka; otherId = ida; }
            else continue; // neither side is a block — not ours to fix here
            const block = tab.blocks.find((b) => b.id === blockId);
            const otherBox = findBox(otherKind, otherId);
            if (!block || !otherBox) continue;
            pushClear(block, [otherBox], gapFor("block", otherKind));
            nudgedAny = true;
          }
          return nudgedAny;
        }

        // --- orchestration ------------------------------------------------
        // Call the data-coord resolvers BEFORE render; resolveLabels AFTER.
        // Two-level pipeline: settle blocks inside each zone → pack zones +
        // free blocks as rigid units → normalize to the top-left origin →
        // grow containers around members → place titles.
        function run() {
          const units = groupUnits();
          units.forEach((u) => resolveBlocks(u.members)); // level 1: within each zone
          units.forEach((u) => { u.box = unitBox(u); });
          packUnits(units);                               // level 2: zones as rigid units
          normalizeOrigin(units);                         // top-left corner contract
          fitContainers();
          placeTitles();
        }

        return {
          // primitives (exposed for custom layouts / tests)
          measureText, textBox, penetration, overlaps, contains, titleBox,
          // policy + registry
          POLICY: { GAP, isConflict, gapFor }, register, clear, reg,
          // resolvers + audit
          resolveBlocks, resolveBlocksBFS, pushClear, placeTitles, fitContainers,
          groupUnits, unitBox, moveUnit, packUnits, normalizeOrigin, resolveLabels,
          nudgeBlocksForConflicts, audit, run,
        };
      }

      // =====================================================================
      // === RUNTIME =========================================================
      // App holds one TabRuntime per built tab plus the active pointer.
      //   TabRuntime: { def, svg, layout, state:{vb,nodeEls,edgeEls}, built }
      // (`def` is also spread to expose def.blocks/containers/edges as tab.*)
      // =====================================================================
      const App = { activeTabId: null, tabs: {} };
      function activeTab() { return App.tabs[App.activeTabId]; }

      function svgEl(tag, attrs = {}) {
        const el = document.createElementNS(SVG_NS, tag);
        for (const k in attrs) el.setAttribute(k, attrs[k]);
        return el;
      }

      // =====================================================================
      // === RENDER ==========================================================
      // All render functions take the TabRuntime they draw into.
      // =====================================================================
      // defs ids are namespaced per tab — each tab has its own <svg>, and
      // duplicate ids across tabs would make a hidden tab's filter/marker
      // shadow a visible tab's reference (a filtered element whose filter
      // lives in a display:none svg does not paint in Chrome).
      function mkDefs(svg, tabId) {
        const defs = svgEl("defs");
        ["sync", "async"].forEach((kind) => {
          const m = svgEl("marker", {
            id: `arrow-${kind}-${tabId}`, viewBox: "0 0 10 10", refX: "9", refY: "5",
            markerWidth: "7", markerHeight: "7", orient: "auto-start-reverse",
          });
          m.appendChild(svgEl("path", { d: "M0,0 L10,5 L0,10 z", fill: "var(--edge)" }));
          defs.appendChild(m);
        });
        // sequence arrowhead — fill follows the line stroke (context-stroke) so a
        // single marker serves every message style (slate / accent / gray).
        const sm = svgEl("marker", {
          id: `seqarrow-${tabId}`, viewBox: "0 0 10 10", refX: "9", refY: "5",
          markerWidth: "8", markerHeight: "8", orient: "auto-start-reverse",
        });
        sm.appendChild(svgEl("path", { d: "M0,0 L10,5 L0,10 z", fill: "context-stroke" }));
        defs.appendChild(sm);
        const f = svgEl("filter", { id: `shadow-${tabId}`, x: "-20%", y: "-20%", width: "140%", height: "140%" });
        f.appendChild(svgEl("feDropShadow", { dx: "0", dy: "2", stdDeviation: "3", "flood-color": "#000", "flood-opacity": "0.18" }));
        defs.appendChild(f);
        svg.appendChild(defs);
      }

      function blockBox(tab, id) {
        const n = tab.blocks.find((d) => d.id === id);
        return { x: n.x, y: n.y, w: n.w, h: n.h };
      }
      // port on the edge of a block box, picking the side facing the other block,
      // plus the face's OUTWARD normal: (-1,0) left / (+1,0) right / (0,-1) top /
      // (0,+1) bottom. The normal drives geometry-aware curve direction below.
      function portN(tab, fromId, toId, isFrom) {
        const a = blockBox(tab, fromId), b = blockBox(tab, toId);
        const ax = a.x + a.w / 2, ay = a.y + a.h / 2, bx = b.x + b.w / 2, by = b.y + b.h / 2;
        const me = isFrom ? a : b, mx = isFrom ? ax : bx, my = isFrom ? ay : by;
        const dx = (isFrom ? bx - ax : ax - bx), dy = (isFrom ? by - ay : ay - by);
        if (Math.abs(dx) > Math.abs(dy))
          return { x: dx > 0 ? me.x + me.w : me.x, y: my, normal: { x: dx > 0 ? 1 : -1, y: 0 } };
        return { x: mx, y: dy > 0 ? me.y + me.h : me.y, normal: { x: 0, y: dy > 0 ? 1 : -1 } };
      }
      // quadratic control point, geometry-aware:
      // - explicit bendDir (edge-authored) → unchanged: mid + û*BOW_OFFSET*bendDir.
      // - otherwise → perpendicular bow, magnitude BOW_OFFSET, auto-signed so
      //   the tangent at p2 points into p2's face, i.e. the arrowhead always
      //   enters the target block instead of hiding under it.
      // Degenerate chords / zero dot products fall back to offset 0 (straight).
      const BOW_OFFSET = 28;
      function edgeControl(p1, p2, n1, n2, bendDir) {
        const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
        const nx = -(p2.y - p1.y), ny = p2.x - p1.x;
        const len = Math.hypot(nx, ny);
        if (!len) return { x: mx, y: my };
        if (bendDir != null) {
          const off = BOW_OFFSET * bendDir;
          return { x: mx + (nx / len) * off, y: my + (ny / len) * off };
        }
        const ux = nx / len, uy = ny / len;
        const dot = ux * n2.x + uy * n2.y;
        if (dot === 0) return { x: mx, y: my }; // aligned → straight
        const off = BOW_OFFSET * Math.sign(dot);
        return { x: mx + ux * off, y: my + uy * off };
      }
      // {p1, p2, c} for an edge from the CURRENT block positions — single
      // source of truth so render/drag/label/hover never disagree on the curve.
      function edgeGeom(tab, edge) {
        const p1 = portN(tab, edge.from, edge.to, true), p2 = portN(tab, edge.from, edge.to, false);
        const c = edgeControl(p1, p2, p1.normal, p2.normal, edge.bendDir != null ? edge.bendDir : null);
        return { p1, c, p2 };
      }
      function curve(p1, c, p2) {
        return `M${p1.x},${p1.y} Q${c.x},${c.y} ${p2.x},${p2.y}`;
      }
      // point on the quadratic Bézier at parameter t∈[0,1]
      function bezierAt(p1, c, p2, t) {
        const u = 1 - t;
        return {
          x: u * u * p1.x + 2 * u * t * c.x + t * t * p2.x,
          y: u * u * p1.y + 2 * u * t * c.y + t * t * p2.y,
        };
      }
      // t of the curve point closest to `pt` (coarse sample, good enough for hover)
      function nearestT(p1, c, p2, pt) {
        let best = 0.5, bestD = Infinity;
        for (let i = 0; i <= 24; i++) {
          const t = i / 24, q = bezierAt(p1, c, p2, t);
          const d = (q.x - pt.x) ** 2 + (q.y - pt.y) ** 2;
          if (d < bestD) { bestD = d; best = t; }
        }
        return best;
      }
      function renderEdge(tab, edge, idx) {
        const g = svgEl("g"); g.classList.add("edge-group"); g.dataset.idx = idx;
        const { p1, c, p2 } = edgeGeom(tab, edge);
        const d = curve(p1, c, p2);
        // wide transparent hit stroke so the thin line is easy to hover
        const hit = svgEl("path", { d, fill: "none", stroke: "transparent", "stroke-width": "18", "pointer-events": "stroke" });
        const path = svgEl("path", {
          d, fill: "none", stroke: "var(--edge)", "stroke-width": "2",
          "marker-end": `url(#arrow-${edge.style === "async" ? "async" : "sync"}-${tab.id})`,
          ...(edge.style === "dashed" ? { "stroke-dasharray": "6 5" } : {}),
        });
        g.appendChild(hit); g.appendChild(path);

        let bg = null, txt = null, labelW = 0;
        if (edge.label) {
          const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
          labelW = tab.layout.measureText(edge.label, 11) + 14;
          bg = svgEl("rect", { x: mx - labelW / 2, y: my - 11, width: labelW, height: 19, rx: 5, fill: "var(--bg)", opacity: "0.92" });
          txt = svgEl("text", { x: mx, y: my + 3, "text-anchor": "middle", "font-size": "11", fill: "var(--fg-muted)" });
          txt.textContent = edge.label;
          g.appendChild(bg); g.appendChild(txt);

          // register the label box with the guard (live get/set on the DOM)
          tab.layout.register("label", `${edge.from}->${edge.to}#${idx}`,
            () => ({ x: +bg.getAttribute("x"), y: +bg.getAttribute("y"), w: +bg.getAttribute("width"), h: 19 }),
            (box) => {
              bg.setAttribute("x", box.x); bg.setAttribute("y", box.y);
              txt.setAttribute("x", box.x + box.w / 2); txt.setAttribute("y", box.y + 14);
            });

          // hover-follow: while pointing AT this line, the label rides the curve
          // to the point nearest the cursor; it snaps home on leave.
          g.addEventListener("mousemove", (e) => moveLabelToPoint(tab, idx, svgPoint(tab, e.clientX, e.clientY)));
          g.addEventListener("mouseleave", () => restoreLabel(tab, idx));
        }
        tab.state.edgeEls[idx] = { g, hit, path, bg, txt, labelW, labelHome: null };
        return g;
      }

      function renderBlock(tab, block) {
        const c = TYPE[block.type] || TYPE.worker;
        const g = svgEl("g"); g.classList.add("node-group"); g.dataset.id = block.id; g.style.cursor = "pointer";
        g.appendChild(svgEl("rect", {
          x: block.x, y: block.y, width: block.w, height: block.h, rx: 12,
          fill: c.fill, stroke: c.stroke, "stroke-width": "2", filter: `url(#shadow-${tab.id})`,
        }));
        const lines = block.label.split("\n"), lineH = 18;
        const startY = block.y + block.h / 2 - ((lines.length - 1) * lineH) / 2 + 5;
        lines.forEach((line, i) => {
          const t = svgEl("text", {
            x: block.x + block.w / 2, y: startY + i * lineH, "text-anchor": "middle",
            "font-size": "13", "font-weight": "600", fill: "var(--fg)",
          });
          t.textContent = line; g.appendChild(t);
        });
        tab.state.nodeEls[block.id] = g;

        // hover highlight (per block, scoped to this tab)
        const attached = () => tab.edges.map((e, i) => (e.from === block.id || e.to === block.id) ? i : -1).filter((i) => i >= 0);
        // Place the attached labels ONCE, near where the cursor entered, then
        // leave them put — they must not jitter as the mouse roams the block.
        g.addEventListener("mouseenter", (e) => {
          highlight(tab, block.id);
          moveLabelsToPoint(tab, attached(), svgPoint(tab, e.clientX, e.clientY));
        });
        g.addEventListener("mouseleave", () => {
          attached().forEach((i) => restoreLabel(tab, i));
          if (tab.state.pinned) highlight(tab, tab.state.pinned); else clearHighlight(tab);
        });

        // register the block box (live: reads the data, which drag updates)
        tab.layout.register("block", block.id,
          () => ({ x: block.x, y: block.y, w: block.w, h: block.h }),
          (box) => { block.x = box.x; block.y = box.y; });
        return g;
      }

      function renderContainer(tab, s) {
        const g = svgEl("g");
        g.appendChild(svgEl("rect", {
          x: s.x, y: s.y, width: s.w, height: s.h, rx: 16, fill: "none",
          stroke: s.color, "stroke-width": "1.5", "stroke-dasharray": "9 5", opacity: "0.30",
        }));
        // title pill, placed by the guard in clear space
        const tb = tab.layout.titleBox(s, 11);
        g.appendChild(svgEl("rect", { x: tb.x, y: tb.y, width: tb.w, height: tb.h, rx: 6, fill: "var(--surface)", stroke: s.color, "stroke-width": "1.5", opacity: "0.97" }));
        const t = svgEl("text", { x: tb.x + tb.w / 2, y: tb.y + 15, "text-anchor": "middle", "font-size": "11", "font-weight": "600", fill: "var(--fg)" });
        t.textContent = s.label; g.appendChild(t);

        // register container + its title so the auditor can see them
        tab.layout.register("container", s.id, () => ({ x: s.x, y: s.y, w: s.w, h: s.h }));
        tab.layout.register("title", s.id, () => ({ x: tb.x, y: tb.y, w: tb.w, h: tb.h }));
        return g;
      }

      // =====================================================================
      // === SEQUENCE RENDER =================================================
      // A lifeline diagram. Actors are vertical lifelines (left→right in array
      // order); messages are ordered rows (top→bottom). Routed through the same
      // buildTab / fit / zoom / export / panel machinery — only this render
      // branch and fit()'s bbox differ from the system/flow types.
      // =====================================================================
      const SEQ = {
        leftPad: 70,    // equal left/right margin
        actorW: 0,      // computed per tab from the widest label
        actorH: 52,
        gapX: 300,      // adjacent lifelines ~300px apart (center to center)
        topY: 40,       // top actor-box row
        rowGap: 56,     // gap from top boxes to first message row
        stepCross: 64,  // vertical advance after a cross message
        stepSelf: 82,   // vertical advance after a self message
        loopW: 50, loopH: 34,
        labelFS: 18, labelH: 30,
        barW: 10,       // activation-bar thickness (centered on the lifeline x)
      };

      function drawSequenceTab(tab, { refit = true } = {}) {
        const svg = tab.svg;
        while (svg.firstChild) svg.removeChild(svg.firstChild);
        tab.state.msgEls = [];
        const measure = tab.layout.measureText;

        // actor box width hugs the widest label (kept uniform so lifelines align)
        let actorW = 150;
        tab.actors.forEach((a) => { actorW = Math.max(actorW, measure(a.label, 15) + 44); });
        const S = SEQ, idxOf = {};
        tab.actors.forEach((a, i) => (idxOf[a.id] = i));
        const cx = (i) => S.leftPad + actorW / 2 + i * S.gapX;

        // assign a row y to each message; step depends on the message kind
        let y = S.topY + S.actorH + S.rowGap;
        tab.messages.forEach((m) => { m._y = y; y += (m.from === m.to) ? S.stepSelf : S.stepCross; });
        // after the loop `y` already sits one step below the last row → use it
        // (minus a touch) as the bottom actor-box row, so there's balanced air.
        const lifelineTop = S.topY + S.actorH;
        const bottomBoxY = y - 18;
        const lifelineBot = bottomBoxY;

        // activation bars: explicit activate/deactivate flags, merged by depth
        const depth = {}, barStart = {}, bars = [];
        tab.messages.forEach((m) => {
          if (m.activate) {            // receiver becomes active
            depth[m.to] = (depth[m.to] || 0) + 1;
            if (depth[m.to] === 1) barStart[m.to] = m._y;
          }
          if (m.deactivate) {         // sender finishes
            depth[m.from] = Math.max(0, (depth[m.from] || 0) - 1);
            if (depth[m.from] === 0) bars.push({ actor: m.from, y0: barStart[m.from], y1: m._y });
          }
        });
        Object.keys(depth).forEach((id) => {   // unbalanced → run to bottom box
          if (depth[id] > 0) bars.push({ actor: id, y0: barStart[id], y1: bottomBoxY });
        });

        mkDefs(svg, tab.id);
        const lifeG = svgEl("g"), barG = svgEl("g"), msgG = svgEl("g"), actorG = svgEl("g");
        svg.appendChild(lifeG); svg.appendChild(barG); svg.appendChild(msgG); svg.appendChild(actorG);

        // --- lifelines + top/bottom actor boxes (UML style) ---------------
        tab.actors.forEach((a, i) => {
          const x = cx(i), col = TYPE[a.type] || TYPE.worker;
          lifeG.appendChild(svgEl("line", {
            x1: x, y1: lifelineTop, x2: x, y2: lifelineBot,
            stroke: col.stroke, "stroke-width": "1.5", "stroke-dasharray": "6 6", opacity: "0.5",
          }));
          [S.topY, bottomBoxY].forEach((by) => {
            actorG.appendChild(svgEl("rect", {
              x: x - actorW / 2, y: by, width: actorW, height: S.actorH, rx: 12,
              fill: col.fill, stroke: col.stroke, "stroke-width": "2", filter: `url(#shadow-${tab.id})`,
            }));
            const t = svgEl("text", {
              x, y: by + S.actorH / 2 + 5, "text-anchor": "middle",
              "font-size": "15", "font-weight": "600", fill: "var(--fg)",
            });
            t.textContent = a.label; actorG.appendChild(t);
          });
        });

        // --- activation bars (UML execution occurrences) -------------------
        bars.forEach((b) => {
          const i = idxOf[b.actor]; if (i == null) return;
          if (b.y1 - b.y0 <= 0) return; // zero/negative-height bar (e.g. self-msg with activate+deactivate) — nothing to draw
          const col = TYPE[tab.actors[i].type] || TYPE.worker;
          barG.appendChild(svgEl("rect", {
            x: cx(i) - S.barW / 2, y: b.y0, width: S.barW, height: b.y1 - b.y0,
            rx: 2, fill: col.fill, stroke: col.stroke, "stroke-width": "1.5",
          }));
        });

        // --- messages ------------------------------------------------------
        let bbMinX = cx(0) - actorW / 2, bbMaxX = cx(tab.actors.length - 1) + actorW / 2;
        const labelBox = (g, lx, ly, lw) => {
          g.appendChild(svgEl("rect", { x: lx, y: ly, width: lw, height: S.labelH, rx: 7,
            fill: "var(--surface)", stroke: "var(--border)", "stroke-width": "1" }));
        };
        tab.messages.forEach((m, idx) => {
          const g = svgEl("g"); g.classList.add("msg-group"); g.dataset.idx = idx; g.style.cursor = "pointer";
          const st = MSG_STYLE[m.style] || MSG_STYLE.sync;
          const dash = st.dash ? { "stroke-dasharray": st.dash } : {};
          const yy = m._y, lw = measure(m.label, S.labelFS) + 20;

          if (m.from === m.to) {
            // self message — small loop hanging off the RIGHT of the lifeline
            const x = cx(idxOf[m.from]);
            const d = `M${x},${yy} h${S.loopW} v${S.loopH} h${-S.loopW}`;
            g.appendChild(svgEl("path", { d, fill: "none", stroke: "transparent", "stroke-width": "16", "pointer-events": "stroke" }));
            g.appendChild(svgEl("path", { d, fill: "none", stroke: st.stroke, "stroke-width": "2",
              "marker-end": `url(#seqarrow-${tab.id})`, ...dash }));
            const lx = x + S.loopW + 12, ly = yy + S.loopH / 2 - S.labelH / 2;
            labelBox(g, lx, ly, lw);
            const t = svgEl("text", { x: lx + lw / 2, y: ly + S.labelH / 2 + 6, "text-anchor": "middle",
              "font-size": S.labelFS, "font-weight": "600", fill: "var(--fg)" });
            t.textContent = m.label; g.appendChild(t);
            bbMaxX = Math.max(bbMaxX, lx + lw);
          } else {
            // cross message — horizontal arrow from→to; passes OVER any
            // in-between lifeline (drawn above it) without stopping there.
            const x1 = cx(idxOf[m.from]), x2 = cx(idxOf[m.to]);
            const d = `M${x1},${yy} L${x2},${yy}`;
            g.appendChild(svgEl("path", { d, fill: "none", stroke: "transparent", "stroke-width": "16", "pointer-events": "stroke" }));
            g.appendChild(svgEl("path", { d, fill: "none", stroke: st.stroke, "stroke-width": "2.5",
              "marker-end": `url(#seqarrow-${tab.id})`, ...dash }));
            const mxp = (x1 + x2) / 2, lx = mxp - lw / 2, ly = yy - S.labelH - 8;
            labelBox(g, lx, ly, lw);
            const t = svgEl("text", { x: mxp, y: ly + S.labelH / 2 + 6, "text-anchor": "middle",
              "font-size": S.labelFS, "font-weight": "600", fill: "var(--fg)" });
            t.textContent = m.label; g.appendChild(t);
            bbMinX = Math.min(bbMinX, lx); bbMaxX = Math.max(bbMaxX, lx + lw);
          }
          g.addEventListener("mouseenter", () => seqHighlight(tab, idx));
          g.addEventListener("mouseleave", () => seqClear(tab));
          msgG.appendChild(g);
          tab.state.msgEls[idx] = g;
        });

        tab.state.contentBBox = { x: bbMinX, y: S.topY, w: bbMaxX - bbMinX, h: (bottomBoxY + S.actorH) - S.topY };
        if (refit || !tab.state.vb) fit(tab); else applyViewBox(tab);
      }

      function seqHighlight(tab, idx) {
        tab.state.msgEls.forEach((g, i) => g.classList.toggle("dimmed", i !== idx));
      }
      function seqClear(tab) {
        tab.state.msgEls.forEach((g) => g.classList.remove("dimmed"));
      }
      function openMessagePanel(tab, m) {
        const fromA = tab.actors.find((a) => a.id === m.from);
        const toA = tab.actors.find((a) => a.id === m.to);
        openPanel({
          type: (fromA || {}).type,
          badgeLabel: `${(fromA || {}).label || m.from} → ${(toA || {}).label || m.to}`,
          label: m.label, description: m.description, tech: m.tech, responsibilities: m.responsibilities,
        });
      }

      function updateEdges(tab) {
        tab.edges.forEach((edge, idx) => {
          const rec = tab.state.edgeEls[idx]; if (!rec) return;
          const { p1, c, p2 } = edgeGeom(tab, edge);
          const d = curve(p1, c, p2);
          rec.path.setAttribute("d", d); if (rec.hit) rec.hit.setAttribute("d", d);
          if (rec.bg && rec.txt) {
            // cheap re-centering on the chord midpoint while a block is dragged;
            // the full slide-along placement re-runs on pointerup.
            const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
            const w = +rec.bg.getAttribute("width");
            rec.bg.setAttribute("x", mx - w / 2); rec.bg.setAttribute("y", my - 11);
            rec.txt.setAttribute("x", mx); rec.txt.setAttribute("y", my + 3);
            rec.labelHome = { x: mx - w / 2, y: my - 11 };
          }
        });
      }

      function redrawBlock(tab, block) {
        const g = tab.state.nodeEls[block.id];
        const rect = g.querySelector("rect");
        rect.setAttribute("x", block.x); rect.setAttribute("y", block.y);
        const lines = block.label.split("\n"), lineH = 18;
        const startY = block.y + block.h / 2 - ((lines.length - 1) * lineH) / 2 + 5;
        g.querySelectorAll("text").forEach((t, i) => {
          t.setAttribute("x", block.x + block.w / 2); t.setAttribute("y", startY + i * lineH);
        });
      }

      // =====================================================================
      // === INTERACTIONS ====================================================
      // Canvas + toolbar listeners are wired once and always act on the
      // ACTIVE tab; hover is wired per block during renderBlock.
      // =====================================================================
      function svgPoint(tab, clientX, clientY) {
        const r = tab.svg.getBoundingClientRect();
        return {
          x: tab.state.vb.x + ((clientX - r.left) / r.width) * tab.state.vb.w,
          y: tab.state.vb.y + ((clientY - r.top) / r.height) * tab.state.vb.h,
        };
      }
      function applyViewBox(tab) {
        tab.svg.setAttribute("viewBox", `${tab.state.vb.x} ${tab.state.vb.y} ${tab.state.vb.w} ${tab.state.vb.h}`);
      }
      function fit(tab) {
        let minX, minY, maxX, maxY;
        if (tab.type === "sequence") {
          const b = tab.state.contentBBox;
          minX = b.x; minY = b.y; maxX = b.x + b.w; maxY = b.y + b.h;
        } else {
          const items = tab.layout.reg.block.map((e) => e.get()).concat(tab.layout.reg.container.map((e) => e.get()));
          minX = Math.min(...items.map((b) => b.x)); minY = Math.min(...items.map((b) => b.y));
          maxX = Math.max(...items.map((b) => b.x + b.w)); maxY = Math.max(...items.map((b) => b.y + b.h));
        }
        const pad = 60;
        tab.state.vb = { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
        applyViewBox(tab);
      }
      function zoom(tab, factor, cxp, cyp) {
        const c = (cxp == null) ? { x: tab.state.vb.x + tab.state.vb.w / 2, y: tab.state.vb.y + tab.state.vb.h / 2 } : svgPoint(tab, cxp, cyp);
        tab.state.vb.w *= factor; tab.state.vb.h *= factor;
        tab.state.vb.x = c.x - (c.x - tab.state.vb.x) * factor;
        tab.state.vb.y = c.y - (c.y - tab.state.vb.y) * factor;
        applyViewBox(tab);
      }

      function wireInteractions() {
        const canvas = document.getElementById("canvas");
        let panning = false, dragBlock = null, last = null, downAt = null, downNodeId = null, downMsgIdx = null;
        let panelTimer = null, lastClick = null; // single- vs double-click disambiguation

        canvas.addEventListener("pointerdown", (e) => {
          const tab = activeTab(); if (!tab) return;
          const ng = e.target.closest(".node-group");
          const mg = e.target.closest(".msg-group"); // sequence message (no drag — click only)
          downAt = { x: e.clientX, y: e.clientY };
          downNodeId = ng ? ng.dataset.id : null; // captured BEFORE setPointerCapture, when e.target is reliable
          downMsgIdx = mg ? +mg.dataset.idx : null;
          if (ng) { dragBlock = tab.blocks.find((n) => n.id === ng.dataset.id); }
          else { panning = true; }
          last = { x: e.clientX, y: e.clientY };
          canvas.setPointerCapture(e.pointerId);
        });
        canvas.addEventListener("pointermove", (e) => {
          if (!last) return;
          const tab = activeTab(); if (!tab) return;
          const dx = e.clientX - last.x, dy = e.clientY - last.y;
          const rect = tab.svg.getBoundingClientRect();
          const sx = tab.state.vb.w / rect.width, sy = tab.state.vb.h / rect.height;
          if (dragBlock) {
            dragBlock.x += dx * sx; dragBlock.y += dy * sy;
            redrawBlock(tab, dragBlock); updateEdges(tab);
          } else if (panning) {
            tab.state.vb.x -= dx * sx; tab.state.vb.y -= dy * sy; applyViewBox(tab);
          }
          last = { x: e.clientX, y: e.clientY };
        });
        canvas.addEventListener("pointerup", (e) => {
          const tab = activeTab();
          const moved = downAt && (Math.abs(e.clientX - downAt.x) + Math.abs(e.clientY - downAt.y) > 4);
          // sequence: a click (no drag) on a message opens its side panel.
          if (tab && tab.type === "sequence") {
            if (downMsgIdx != null && !moved) openMessagePanel(tab, tab.messages[downMsgIdx]);
            panning = false; last = null; downMsgIdx = null; downAt = null; return;
          }
          // Use the node captured at pointerdown — pointer capture makes the
          // pointerup target the canvas, not the node. Detect single vs double
          // click manually so a double-click pins WITHOUT also opening the panel.
          const id = (tab && !moved) ? downNodeId : null;
          if (id) {
            const now = e.timeStamp;
            if (lastClick && lastClick.id === id && now - lastClick.time < 300) {
              // DOUBLE-CLICK → toggle the pin; suppress the pending panel
              if (panelTimer) { clearTimeout(panelTimer); panelTimer = null; }
              lastClick = null;
              tab.state.pinned = (tab.state.pinned === id) ? null : id;
              highlight(tab, id); // pinned chain, or hover chain if just unpinned
            } else {
              // SINGLE-CLICK candidate → open the panel shortly, unless a second
              // click arrives within 300ms and turns it into a double-click
              if (panelTimer) clearTimeout(panelTimer);
              lastClick = { id, time: now };
              const block = tab.blocks.find((n) => n.id === id);
              panelTimer = setTimeout(() => {
                panelTimer = null; lastClick = null;
                if (tab.state.pinned && tab.state.pinned !== id) tab.state.pinned = null; // clicking another node clears the pin
                openPanel(block);
              }, 280);
            }
          }
          // a block was dragged to a new spot → re-tidy label placement
          if (dragBlock && moved && tab) tab.layout.resolveLabels();
          dragBlock = null; panning = false; last = null; downNodeId = null;
        });
        canvas.addEventListener("wheel", (e) => {
          const tab = activeTab(); if (!tab) return;
          e.preventDefault(); zoom(tab, e.deltaY > 0 ? 1.1 : 0.9, e.clientX, e.clientY);
        }, { passive: false });

        document.getElementById("btn-zoom-in").onclick = () => { const t = activeTab(); if (t) zoom(t, 0.85); };
        document.getElementById("btn-zoom-out").onclick = () => { const t = activeTab(); if (t) zoom(t, 1.18); };
        document.getElementById("btn-fit").onclick = () => { const t = activeTab(); if (t) fit(t); };
        document.getElementById("btn-theme").onclick = toggleTheme;
        document.getElementById("btn-audit").onclick = () => {
          const t = activeTab(); if (!t) return;
          const r = t.layout.audit();
          if (r.ok) { alert("✓ 沒有重疊。"); return; }
          if (confirm(`✗ 發現 ${r.count} 個重疊。要自動重新排版嗎？（會還原節點位置為整齊版面）`)) {
            autoFix(t);
            const r2 = t.layout.audit();
            alert(r2.ok ? "✓ 已重新排版，沒有重疊。"
                        : `已重新排版，仍有 ${r2.count} 個重疊（多為標籤與標題的微調，請調整起始座標）。`);
          }
        };
        document.getElementById("btn-svg").onclick = exportSVG;
        document.getElementById("btn-png").onclick = exportPNG;
        document.getElementById("panel-close").onclick = closePanel;
        document.getElementById("panel-backdrop").onclick = closePanel;
        const helpModal = document.getElementById("help-modal");
        document.getElementById("btn-help").onclick = () => helpModal.classList.add("open");
        document.getElementById("help-close").onclick = () => helpModal.classList.remove("open");
        document.getElementById("help-backdrop").onclick = () => helpModal.classList.remove("open");
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape") { helpModal.classList.remove("open"); closePanel(); }
        });
      }

      // the "chain" a node is part of: its full upstream flow (everything that
      // reaches it) plus its full downstream flow (everything it reaches),
      // following edge direction. Unrelated siblings stay dim.
      function reach(tab, id, dir) {
        const seen = new Set([id]), stack = [id];
        while (stack.length) {
          const c = stack.pop();
          tab.edges.forEach((e) => {
            const nxt = dir === "down" ? (e.from === c ? e.to : null) : (e.to === c ? e.from : null);
