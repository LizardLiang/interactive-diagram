            if (nxt && !seen.has(nxt)) { seen.add(nxt); stack.push(nxt); }
          });
        }
        return seen;
      }
      function chain(tab, id) {
        return new Set([...reach(tab, id, "down"), ...reach(tab, id, "up")]);
      }
      function highlight(tab, id) {
        const keep = chain(tab, id);
        tab.blocks.forEach((n) => tab.state.nodeEls[n.id].classList.toggle("dimmed", !keep.has(n.id)));
        // an edge is part of the chain when BOTH endpoints are in the reachable set
        tab.edges.forEach((e, i) => tab.state.edgeEls[i].g.classList.toggle("dimmed", !(keep.has(e.from) && keep.has(e.to))));
      }
      function clearHighlight(tab) {
        tab.blocks.forEach((n) => tab.state.nodeEls[n.id].classList.remove("dimmed"));
        tab.edges.forEach((e, i) => tab.state.edgeEls[i].g.classList.remove("dimmed"));
      }

      // ---------------------------------------------------------------------
      // Edge-label placement & hover-follow.
      // A label rides its OWN curve; placeLabels picks the clearest resting
      // point along it, and hover slides it to the cursor without detaching.
      // ---------------------------------------------------------------------
      const LABEL_H = 19;
      // sum of overlap "area" of `box` against every obstacle (0 ⇒ clear).
      // Each obstacle may carry its own audit clearance in `_gap` (blocks and
      // titles need GAP.mixed = 8; sibling labels need GAP.label = 4) so the
      // search accepts only spots the audit will also accept.
      function labelScore(tab, box, obstacles) {
        let s = 0;
        for (const o of obstacles) {
          const p = tab.layout.penetration(box, o, o._gap != null ? o._gap : 4);
          if (p.ox > 0 && p.oy > 0) s += p.ox * p.oy;
        }
        return s;
      }
      // place a label centered on the curve point at parameter t
      function labelBoxAt(p1, c, p2, t, w) {
        const q = bezierAt(p1, c, p2, t);
        return { x: q.x - w / 2, y: q.y - LABEL_H / 2, w, h: LABEL_H };
      }
      function setLabelBox(rec, box) {
        rec.bg.setAttribute("x", box.x); rec.bg.setAttribute("y", box.y);
        rec.txt.setAttribute("x", box.x + box.w / 2); rec.txt.setAttribute("y", box.y + 14);
      }
      // unit normal of the curve at t (for nudging a label off the line)
      function curveNormal(p1, c, p2, t) {
        const tx = 2 * (1 - t) * (c.x - p1.x) + 2 * t * (p2.x - c.x);
        const ty = 2 * (1 - t) * (c.y - p1.y) + 2 * t * (p2.y - c.y);
        const l = Math.hypot(tx, ty) || 1;
        return { x: -ty / l, y: tx / l };
      }
      function labelBoxAtOff(p1, c, p2, t, off, w) {
        const q = bezierAt(p1, c, p2, t), n = curveNormal(p1, c, p2, t);
        return { x: q.x + n.x * off - w / 2, y: q.y + n.y * off - LABEL_H / 2, w, h: LABEL_H };
      }
      // Guaranteed-clear settle pass: place each label at the clearest spot,
      // searching first ALONG its curve (slide the anchor point) and then a
      // small perpendicular nudge OFF the curve so it can escape a block the
      // line passes through while staying visually attached.
      //
      // Labels settle ONE AT A TIME in top-left BFS order (same pin-settled
      // philosophy as the block resolver): each settled label becomes a
      // fixed obstacle for the next, instead of the old approach where every
      // label re-negotiated against every other label's CURRENT (possibly
      // still-moving) box across a fixed 3-pass budget. If the base
      // candidate set can't find a fully-clear (score-0) spot, the search
      // EXPANDS — more t-samples along the curve, larger perpendicular
      // offsets — before giving up. A label that still can't clear anything
      // is left at its best-effort spot; audit() (run by the outer
      // convergence loop) will flag the residual label×block/title overlap,
      // and nudgeBlocksForConflicts() pushes the block to make room — labels
      // are first-class obstacles that may displace blocks, per spec.
      const T_CANDIDATES = [0.5, 0.4, 0.6, 0.32, 0.68, 0.25, 0.75];
      const N_OFFSETS = [0, 13, -13, 24, -24];
      const T_EXPANDED = [0.15, 0.85, 0.1, 0.9, 0.05, 0.95, 0, 1];
      const N_OFFSETS_EXPANDED = [34, -34, 44, -44, 54, -54, 64, -64];
      // Search the candidate set for the clearest (lowest-score) box for ONE
      // label against `obstacles`. Base tier (T_CANDIDATES × N_OFFSETS) first;
      // only if nothing there is fully clear does it expand to the wider
      // tier (T_EXPANDED / N_OFFSETS_EXPANDED). Same candidate order and
      // score-0 early-exit as the original inline search — extracted so
      // placeLabels() itself stays flat (single-purpose per-label search
      // lives here instead of nested 4-deep inside the settle loop).
      function bestClearBox(tab, rec, obstacles) {
        const { p1, c, p2 } = rec._curve;
        const short = Math.hypot(p2.x - p1.x, p2.y - p1.y) < rec.labelW * 0.8;
        const tTiers = short ? [[0.5]] : [T_CANDIDATES, T_CANDIDATES.concat(T_EXPANDED)];
        // last-resort escape offsets scale with the label's own width — a wide
        // label pinned on a short edge between stacked blocks needs more than
        // the fixed ±64 to slide clear sideways off the line.
        const far = rec.labelW / 2 + 30;
        const oTiers = [N_OFFSETS, N_OFFSETS.concat(N_OFFSETS_EXPANDED, [far, -far, far + 22, -far - 22])];
        let best = rec._box, bestScore = Infinity;
        search:
        for (const ts of tTiers) {
          for (const offs of oTiers) {
            for (const t of ts) {
              for (const off of offs) {
                const box = labelBoxAtOff(p1, c, p2, t, off, rec.labelW);
                // prefer the centre of the line and the line itself (small bias)
                const sc = labelScore(tab, box, obstacles) + Math.abs(t - 0.5) * 0.01 + Math.abs(off) * 0.02;
                if (sc < bestScore) { bestScore = sc; best = box; }
              }
              if (bestScore === 0) break search;
            }
          }
        }
        return best;
      }
      function placeLabels(tab) {
        const labeled = tab.edges
          .map((edge, idx) => ({ edge, idx, rec: tab.state.edgeEls[idx] }))
          .filter((x) => x.rec && x.rec.bg && x.rec.txt);
        if (!labeled.length) return;
        // static obstacles: every block box + every container title box.
        // Tagged with the audit clearance (GAP.mixed = 8) so the label search
        // and the auditor agree on what "clear" means.
        const statics = [
          ...tab.layout.reg.block.map((e) => e.get()),
          ...tab.layout.reg.title.map((e) => e.get()),
        ].filter(Boolean).map((b) => Object.assign({}, b, { _gap: 8 }));

        // seed each label on its curve midpoint (t = 0.5, no offset) — the
        // seed position also drives the top-left settle order below.
        labeled.forEach(({ edge, rec }) => {
          const { p1, c, p2 } = edgeGeom(tab, edge);
          rec._curve = { p1, c, p2 };
          rec._box = labelBoxAt(p1, c, p2, 0.5, rec.labelW);
        });

        const order = labeled.slice().sort((a, b) =>
          (a.rec._box.y - b.rec._box.y) || (a.rec._box.x - b.rec._box.x));

        const settled = []; // boxes of labels already placed this pass (fixed obstacles)
        order.forEach(({ rec }) => {
          const best = bestClearBox(tab, rec, statics.concat(settled));
          rec._box = best;
          settled.push(best);
        });

        labeled.forEach(({ rec }) => {
          setLabelBox(rec, rec._box);
          rec.labelHome = { x: rec._box.x, y: rec._box.y };
        });
      }
      // hover: ride the label to the curve point nearest the cursor, but keep
      // it clear of the ports — the curve endpoints sit ON the connected blocks,
      // so an unclamped nearestT (when the cursor is on the far side of a block)
      // would centre the label on the block edge and overlap it.
      // Place one followed label at the point on its line nearest the cursor,
      // then slide the MINIMUM along the line needed to clear its endpoint
      // blocks AND any boxes in `avoid` (sibling labels already placed during
      // the same block hover). Returns the final box (or null).
      function placeFollowLabel(tab, idx, pt, avoid) {
        const rec = tab.state.edgeEls[idx]; if (!rec || !rec.bg) return null;
        const edge = tab.edges[idx];
        const { p1, c, p2 } = edgeGeom(tab, edge);
        // The cursor-nearest point on the line is the ideal anchor, but the
        // ports sit on the connected blocks and siblings on other lines exit the
        // same corner. Scan the whole line for the spot that least overlaps the
        // endpoint blocks and the already-placed siblings, biased toward the
        // anchor — so each label hugs the cursor yet the fan spreads out.
        const anchorT = nearestT(p1, c, p2, pt);
        const obstacles = [edge.from, edge.to]
          .map((id) => tab.blocks.find((b) => b.id === id))
          .filter(Boolean).map((b) => ({ x: b.x, y: b.y, w: b.w, h: b.h }))
          .concat(avoid || []);
        let best = null, bestScore = Infinity;
        for (let tt = 0; tt <= 1.0001; tt += 0.02) {
          for (const off of N_OFFSETS) {            // small perpendicular nudge to dodge siblings
            const box = labelBoxAtOff(p1, c, p2, tt, off, rec.labelW);
            let area = 0;
            for (const o of obstacles) { const p = tab.layout.penetration(box, o, 2); if (p.ox > 0 && p.oy > 0) area += p.ox * p.oy; }
            // clearance first; then stay near the cursor and on the line
            const score = area + Math.abs(tt - anchorT) * 6 + Math.abs(off) * 0.4;
            if (score < bestScore) { bestScore = score; best = box; }
          }
        }
        setLabelBox(rec, best);
        return best;
      }
      function moveLabelToPoint(tab, idx, pt) { placeFollowLabel(tab, idx, pt, null); }
      // Block hover: place every attached label, each avoiding the siblings
      // already placed, so multiple lines into one block don't stack labels.
      // Nearest lines first, so the closest label keeps the spot by the cursor.
      function moveLabelsToPoint(tab, indices, pt) {
        const order = indices.slice().sort((a, b) => {
          const ca = edgeGeom(tab, tab.edges[a]), cb = edgeGeom(tab, tab.edges[b]);
          const da = nearestT(ca.p1, ca.c, ca.p2, pt), db = nearestT(cb.p1, cb.c, cb.p2, pt);
          const qa = bezierAt(ca.p1, ca.c, ca.p2, da), qb = bezierAt(cb.p1, cb.c, cb.p2, db);
          return Math.hypot(qa.x - pt.x, qa.y - pt.y) - Math.hypot(qb.x - pt.x, qb.y - pt.y);
        });
        const placed = [];
        order.forEach((i) => { const box = placeFollowLabel(tab, i, pt, placed); if (box) placed.push(box); });
      }
      function restoreLabel(tab, idx) {
        const rec = tab.state.edgeEls[idx]; if (!rec || !rec.bg || !rec.labelHome) return;
        setLabelBox(rec, { x: rec.labelHome.x, y: rec.labelHome.y, w: rec.labelW });
      }

      function openPanel(block) {
        const c = TYPE[block.type] || TYPE.worker;
        const badge = document.getElementById("panel-type-badge");
        badge.textContent = block.badgeLabel || TYPE_LABELS[block.type] || block.type;
        badge.style.background = c.fill; badge.style.color = c.stroke;
        document.getElementById("panel-title").textContent = block.label.replace(/\n/g, " ");
        document.getElementById("panel-desc").textContent = block.description || "";
        document.getElementById("panel-tech").innerHTML = (block.tech || []).map((t) => `<span class="panel-tag">${t}</span>`).join("");
        document.getElementById("panel-resp").innerHTML = (block.responsibilities || []).map((r) => `<div class="panel-resp-item">${r}</div>`).join("");
        document.getElementById("side-panel").classList.add("open");
        document.getElementById("panel-backdrop").classList.add("open");
      }
      function closePanel() {
        document.getElementById("side-panel").classList.remove("open");
        document.getElementById("panel-backdrop").classList.remove("open");
      }

      // Theme persistence — GLOBAL across all tabs. The chosen color schema
      // survives reloads via localStorage (falls back to in-memory if storage
      // is unavailable, e.g. file:// in some browsers).
      const THEME_KEY = "interactive-diagram-theme";
      function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        document.getElementById("btn-theme").textContent = theme === "dark" ? "◑ 淺色" : "◐ 深色";
        try { localStorage.setItem(THEME_KEY, theme); } catch (_) {}
      }
      function loadTheme() {
        let saved = null;
        try { saved = localStorage.getItem(THEME_KEY); } catch (_) {}
        if (saved !== "dark" && saved !== "light") {
          saved = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        applyTheme(saved);
      }
      function toggleTheme() {
        applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark");
      }

      // =====================================================================
      // === EXPORT ==========================================================
      // Acts on the ACTIVE tab's <svg>.
      // =====================================================================
      function serializedSVG() {
        const tab = activeTab();
        const clone = tab.svg.cloneNode(true);
        clone.setAttribute("xmlns", SVG_NS);
        // Pin width/height to the active viewBox so the export keeps the
        // diagram's own aspect ratio. Without explicit dimensions an SVG with
        // only a viewBox rasterizes at the browser's 300×150 default and comes
        // out stretched when drawn onto an aspect-correct canvas.
        const vb = tab.state.vb;
        clone.setAttribute("viewBox", `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
        clone.setAttribute("width", vb.w);
        clone.setAttribute("height", vb.h);
        // inline the resolved CSS variables so the export is portable
        const cs = getComputedStyle(document.documentElement);
        let xml = new XMLSerializer().serializeToString(clone);
        xml = xml.replace(/var\((--[\w-]+)\)/g, (_, v) => cs.getPropertyValue(v).trim() || "#000");
        return `<?xml version="1.0"?>\n${xml}`;
      }
      function download(blob, name) {
        const url = URL.createObjectURL(blob), a = document.createElement("a");
        a.href = url; a.download = name; a.click(); URL.revokeObjectURL(url);
      }
      function exportSVG() { download(new Blob([serializedSVG()], { type: "image/svg+xml" }), `${App.activeTabId}.svg`); }
      function exportPNG() {
        const tab = activeTab();
        const xml = serializedSVG();
        const img = new Image();
        img.onload = () => {
          const scale = 2, c = document.createElement("canvas");
          c.width = tab.state.vb.w * scale; c.height = tab.state.vb.h * scale;
          const ctx = c.getContext("2d");
          ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim() || "#fff";
          ctx.fillRect(0, 0, c.width, c.height);
          ctx.drawImage(img, 0, 0, c.width, c.height);
          c.toBlob((b) => download(b, `${App.activeTabId}.png`));
        };
        img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(xml)));
      }

      function renderLegend(tab) {
        const title = document.getElementById("legend-title");
        const box = document.getElementById("legend-items");
        if (tab.type === "sequence") {
          title.textContent = "圖例";
          // a small line swatch for an arrow style (loop glyph for `internal`)
          const swatch = (color, dash, loop) => {
            if (loop) return `<svg width="22" height="12" style="flex-shrink:0"><path d="M2,2 h10 v8 h-10" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
            const da = dash ? ` stroke-dasharray="${dash}"` : "";
            return `<svg width="22" height="12" style="flex-shrink:0"><line x1="1" y1="6" x2="18" y2="6" stroke="${color}" stroke-width="2"${da}/><path d="M15,2 L21,6 L15,10 z" fill="${color}"/></svg>`;
          };
          const actors = tab.actors.map((a) =>
            `<div class="legend-item"><div class="legend-dot" style="background:${(TYPE[a.type] || TYPE.worker).stroke}"></div>${a.label}</div>`
          ).join("");
          const barSwatch = `<svg width="22" height="12" style="flex-shrink:0"><rect x="8" y="1" width="6" height="10" rx="2" fill="${TYPE.worker.fill}" stroke="${TYPE.worker.stroke}" stroke-width="1.5"/></svg>`;
          const activation = `<div class="legend-item">${barSwatch}作用中 (activation)</div>`;
          const sub = `font-size:10px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 5px`;
          const styles = [["sync", false, false], ["stream", false, false], ["return", true, false], ["internal", false, true]]
            .map(([k, dashed, loop]) => {
              const color = k === "stream" ? "var(--seq-accent)" : k === "return" ? "var(--seq-gray)" : "var(--seq-slate)";
              const dash = dashed ? "5 4" : "";
              return `<div class="legend-item">${swatch(color, dash, loop)}${MSG_STYLE_LABELS[k]}</div>`;
            }).join("");
          box.innerHTML = `<div style="${sub};margin-top:0">生命線</div>${actors}${activation}<div style="${sub}">箭頭樣式</div>${styles}`;
          return;
        }
        title.textContent = "節點類型";
        const used = [...new Set(tab.blocks.map((n) => n.type))];
        box.innerHTML = used.map((t) =>
          `<div class="legend-item"><div class="legend-dot" style="background:${TYPE[t].stroke}"></div>${TYPE_LABELS[t] || t}</div>`
        ).join("");
      }

      // =====================================================================
      // === TABS ============================================================
      // =====================================================================
      // Build a tab's <svg> + layout guard on first activation, then cache it.
      function buildTab(def) {
        const tab = { def, svg: null, layout: null, state: { vb: null, nodeEls: {}, edgeEls: [], msgEls: [], pinned: null }, built: false };
        // expose def fields directly on the runtime for the render/layout code
        tab.id = def.id; tab.type = def.type;
        if (def.type === "sequence") {
          tab.actors = def.actors; tab.messages = def.messages;
        } else {
          // containers (and edges) are OPTIONAL — a tab may omit them entirely
          // or mix zoned and free blocks; free blocks pack as standalone units.
          tab.blocks = def.blocks || []; tab.containers = def.containers || []; tab.edges = def.edges || [];
          const known = new Set(tab.containers.map((s) => s.id));
          tab.blocks.forEach((b) => {
            if (b.container && !known.has(b.container))
              console.warn(`[layout] block '${b.id}' references unknown container '${b.container}' — treated as free`);
          });
        }
        tab.layout = makeLayout(tab);

        const svg = svgEl("svg");
        svg.style.display = "none";
        document.getElementById("canvas").appendChild(svg);
        tab.svg = svg;
        App.tabs[def.id] = tab;

        drawTab(tab, { refit: true });   // resolve + draw + frame
        if (tab.type !== "sequence") {
          tab.layout.audit();            // log ✓ / ✗ for this tab (system/flow only)
          // remember the tidy built layout so auto-fix can restore it
          tab.home = tab.blocks.map((b) => ({ id: b.id, x: b.x, y: b.y }));
        }
        tab.built = true;
        return tab;
      }

      // (Re)draw a tab's SVG from its CURRENT data. Re-runs the layout
      // resolvers first, so calling it again after nodes were dragged retidies
      // the diagram — this is what the auto-fix uses.
      // Bounded outer-loop pass count: a label/title pushing a block changes
      // curve geometry (ports move), so after the first placeLabels() we
      // re-check with audit() and, if conflicts remain, nudge the offending
      // block(s) and redo resolve→fit→title→render→label. Hard cap
      // guarantees termination; the caller's own audit() call is the final
      // proof (or reports the rare residual instead of looping forever).
      const OUTER_MAX_PASSES = 4;
      function drawTab(tab, { refit = true } = {}) {
        if (tab.type === "sequence") { drawSequenceTab(tab, { refit }); return; }
        const svg = tab.svg;

        function renderPass() {
          while (svg.firstChild) svg.removeChild(svg.firstChild);
          tab.layout.clear();
          tab.state.nodeEls = {}; tab.state.edgeEls = [];
          // draw — containers (back) → edges → blocks (front)
          mkDefs(svg, tab.id);
          const bgG = svgEl("g"), edgeG = svgEl("g"), nodeG = svgEl("g");
          svg.appendChild(bgG); svg.appendChild(edgeG); svg.appendChild(nodeG);
          tab.containers.forEach((s) => bgG.appendChild(renderContainer(tab, s)));
          tab.edges.forEach((e, i) => edgeG.appendChild(renderEdge(tab, e, i)));
          tab.blocks.forEach((b) => nodeG.appendChild(renderBlock(tab, b)));
        }

        // 1) resolve geometry on the DATA before drawing
        tab.layout.run();                // settle blocks in zones + pack zones top-left + fit + titles

        // 2) draw
        renderPass();

        // 3) de-overlap edge labels on the DOM (guaranteed-clear settle pass)
        tab.layout.resolveLabels();

        // 4) outer convergence loop — labels/titles that had to push a block
        // change edge geometry, so re-resolve + redraw + re-place labels and
        // re-check. Bounded; final audit() (called by the caller) is proof.
        for (let pass = 0; pass < OUTER_MAX_PASSES; pass++) {
          const report = tab.layout.audit({ log: false });
          if (report.ok) break;
          const nudged = tab.layout.nudgeBlocksForConflicts(report);
          if (!nudged) break; // nothing left that a block-push can fix
          tab.layout.run();
          renderPass();
          tab.layout.resolveLabels();
        }

        // 5) frame (initial build) or keep the current zoom/pan (auto-fix)
        if (refit || !tab.state.vb) fit(tab); else applyViewBox(tab);

        // 6) restore a pinned highlight if one was active
        if (tab.state.pinned) highlight(tab, tab.state.pinned);
      }

      // Auto-fix / re-arrange: restore the tidy built layout (the one the
      // layout guard produced and audited at build time), discarding any manual
      // drags, then redraw. This reliably clears drag-induced overlaps without
      // drifting the tuned container/title placement. Anything still flagged
      // afterwards is a build-time layout-hint issue, not a drag artefact.
      function autoFix(tab) {
        if (tab.home) tab.home.forEach((h) => {
          const b = tab.blocks.find((x) => x.id === h.id);
          if (b) { b.x = h.x; b.y = h.y; }
        });
        drawTab(tab, { refit: false }); // redraw at the tidy coords, keep zoom/pan
      }

      function activateTab(id) {
        const tab = App.tabs[id] || buildTab(app.tabs.find((t) => t.id === id));
        App.activeTabId = id;
        for (const tid in App.tabs) App.tabs[tid].svg.style.display = (tid === id) ? "block" : "none";
        renderLegend(tab);
        document.querySelectorAll(".tab-btn").forEach((b) =>
          b.classList.toggle("tab-active", b.dataset.tabId === id));
      }

      function buildTabStrip() {
        if (app.tabs.length <= 1) return;
        const strip = document.getElementById("tab-strip");
        strip.style.display = "flex";
        document.getElementById("tab-sep").style.display = "block";
        app.tabs.forEach((t) => {
          const b = document.createElement("button");
          b.className = "tb-btn tab-btn"; b.dataset.tabId = t.id; b.textContent = t.label;
          b.onclick = () => activateTab(t.id);
          strip.appendChild(b);
        });
      }

      // =====================================================================
      // === INIT ============================================================
      // =====================================================================
      function init() {
        document.getElementById("app-title").textContent = app.title || "Diagram";
        loadTheme();                 // restore the persisted color schema (global)
        buildTabStrip();             // only visible when app.tabs.length > 1
        wireInteractions();          // global canvas + toolbar, act on active tab
        activateTab(app.tabs[0].id); // build + show the first tab
      }

      document.addEventListener("DOMContentLoaded", init);
    </script>
  </body>
</html>
